  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n.node{transition:.1s}\n.node:not(.locked){cursor:pointer}\n.node.locked{cursor:not-allowed}\n.node:not(.locked):hover circle.nb{stroke-width:6}\n.node text{font-family:var(--baloo),Arial;pointer-events:none}\n#maptip{text-align:center;color:#dce6ff;font-size:12px;margin-top:10px}\n\n/* ── Game ── */\n#game{display:none}#game.on{display:block}\ncanvas{display:block;width:960px;height:360px;background:#bfe6ff}\n\n/* bottom control deck — Battle Cats style */\n#ui{background:linear-gradient(180deg,#46608a,#30446311);background:#374f73;border-top:5px solid #caa15a;box-shadow:inset 0 2px 0 #5a7196;padding:8px 10px 10px}\n#hud{display:flex;align-items:center;gap:10px;margin-bottom:8px}\n#moneybox{flex:1;display:flex;align-items:center;gap:8px;min-width:0}\n#coin{font-size:22px;filter:drop-shadow(0 2px 0 #00000055)}\n#mgauge{flex:1;height:22px;background:linear-gradient(180deg,#1a1207,#2c2010);border:3px solid #0d0a05;border-radius:14px;position:relative;overflow:hidden;box-shadow:inset 0 2px 4px #000a}\n#mfill{height:100%;width:0;background:linear-gradient(180deg,#ffe486,#ffc62e 60%,#ff9e12);border-radius:11px;transition:width .06s linear;box-shadow:inset 0 2px 2px #fff6}\n#mtext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--baloo);font-weight:800;font-size:14px;color:#3a2300;text-shadow:0 1px 0 #ffe9a8}\n#mtext #mcap{font-size:11px;opacity:.8;margin-left:3px}\n.ico{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-family:var(--baloo);font-weight:800;font-size:15px;color:#fff;background:#52688c;border:3px solid #cdd8e6;border-radius:12px;cursor:pointer;box-shadow:0 4px 0 #2a3a55;transition:.08s}\n.ico:hover{filter:brightness(1.1)}.ico:active{transform:translateY(3px);box-shadow:0 1px 0 #2a3a55}\n#spd.fast{background:linear-gradient(180deg,#ff9d3f,#e8731a);border-color:#ffc080;box-shadow:0 4px 0 #9c4a0e}\n\n#deck{display:flex;align-items:stretch;gap:6px}\n#slots{flex:1;display:flex;gap:6px;min-width:0}\n.tile{position:relative;border-radius:14px;cursor:pointer;overflow:hidden;flex:1;min-width:64px;border:3px solid #fff;box-shadow:0 5px 0 #00000055;transition:transform .07s}\n.tile:active{transform:translateY(3px);box-shadow:0 2px 0 #00000055}\n/* cat deploy tile */\n.cat{background:linear-gradient(180deg,#fbf3df,#efe0bd);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-top:3px}\n.cat .port{width:100%;height:44px;display:flex;align-items:flex-end;justify-content:center}\n.cat .port canvas{width:54px;height:44px}\n.cat .cnm{width:100%;text-align:center;font-family:var(--baloo);font-weight:800;font-size:9px;line-height:1.05;color:#5a3d12;padding:1px 1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.cat .cost{width:100%;text-align:center;font-family:var(--baloo);font-weight:800;font-size:12px;color:#7a5200;background:linear-gradient(180deg,#ffe07a,#ffc62e);border-top:2px solid #c99a26;padding:1px 0 2px}\n.cat .kx{position:absolute;top:2px;left:4px;font-family:var(--baloo);font-weight:800;font-size:11px;color:#fff;background:#2a4a8c;border:2px solid #fff;border-radius:8px;line-height:1;padding:1px 4px;box-shadow:0 1px 2px #0007}\n.cat .cool{position:absolute;inset:0;pointer-events:none;background:conic-gradient(from -90deg, rgba(6,10,20,.62) var(--deg,0deg), transparent 0)}\n.cat.no{filter:grayscale(.55) brightness(.74)}\n.cat.ok{box-shadow:0 0 0 3px #ffcf3a,0 5px 0 #00000055}\n\n/* worker (wallet upgrade) */\n#worker{flex:0 0 78px;background:linear-gradient(180deg,#5fd07a,#36a155);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;border-color:#fff}\n#worker .we{font-size:22px;line-height:1}\n#worker .wl{font-family:var(--baloo);font-weight:800;font-size:10px;margin-top:1px}\n#worker .wc{font-family:var(--baloo);font-weight:800;font-size:12px;background:#1c7a3c;border-radius:8px;padding:0 6px;margin-top:2px}\n#worker.ok{box-shadow:0 0 0 3px #d6ffdd,0 5px 0 #00000055}\n#worker.max{cursor:default}\n\n/* cat cannon tile */\n#cannon{flex:0 0 96px;background:#7a5aa0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;color:#fff;border-color:#fff}\n#cannon .cfill{position:absolute;left:0;bottom:0;width:100%;background:linear-gradient(180deg,#ff7adf,#a83ad6);opacity:.55;z-index:0}\n#cannon .ce{position:relative;z-index:1;font-size:22px;line-height:1;margin-top:4px}\n#cannon .cl{position:relative;z-index:1;font-family:var(--baloo);font-weight:800;font-size:10px;letter-spacing:.5px;padding-bottom:3px}\n#cannon.ready{box-shadow:0 0 0 3px #ffd24a,0 5px 0 #00000055}\n#cannon.ready .cl{animation:blink .6s infinite}\n@keyframes blink{50%{opacity:.3}}\n\n/* overlay */\n#ov{position:absolute;top:0;left:0;width:100%;height:360px;background:rgba(8,12,22,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:5}\n#ov.on{display:flex}\n#ot{font-family:var(--baloo);font-size:52px;font-weight:800;text-shadow:0 4px 0 #0008}\n#om{font-size:15px;color:#cdd}\n.obtn{font-family:var(--baloo);padding:11px 28px;font-size:15px;font-weight:800;background:linear-gradient(180deg,#ffd86a,#ffbf2e);color:#5a3d00;border:3px solid #fff;border-radius:14px;cursor:pointer;margin:0 5px;box-shadow:0 5px 0 #b8860a}\n.obtn:active{transform:translateY(3px);box-shadow:0 2px 0 #b8860a}\n.obtn.sec{background:linear-gradient(180deg,#5e80c0,#3a5ca0);color:#fff;box-shadow:0 5px 0 #243f73}\n#warn{position:absolute;top:32%;left:50%;transform:translate(-50%,-50%);font-family:var(--baloo);font-size:32px;font-weight:800;pointer-events:none;opacity:0;white-space:nowrap;z-index:4;text-align:center}\n#pausetag{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-family:var(--baloo);font-weight:800;color:#fff;background:#0009;padding:4px 14px;border-radius:20px;display:none;z-index:4}\n#hint{color:#5a6478;font-size:12px;margin-top:8px;font-family:var(--fred)}\n#hint b{color:#8a97b0}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"title\">🐱 THE <b>BATTLE CATS<\u002Fb> 🐱<\u002Fdiv>\n<div id=\"wrap\">\n  <div id=\"sel\" class=\"on\"><h2>★ WORLD MAP ★<\u002Fh2><div id=\"map\"><\u002Fdiv><div id=\"maptip\">Follow the path — clear a stage to unlock the next 🐾<\u002Fdiv><\u002Fdiv>\n  <div id=\"game\">\n    <canvas id=\"c\" width=\"960\" height=\"360\"><\u002Fcanvas>\n    <div id=\"pausetag\">⏸ PAUSED<\u002Fdiv>\n    <div id=\"ui\">\n      <div id=\"hud\">\n        <div id=\"moneybox\">\n          <div id=\"coin\">🪙<\u002Fdiv>\n          <div id=\"mgauge\"><div id=\"mfill\"><\u002Fdiv><div id=\"mtext\"><b id=\"mv\">0<\u002Fb><span id=\"mcap\">/800<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ico\" id=\"spd\">▶1×<\u002Fdiv>\n        <div class=\"ico\" id=\"pause\">⏸<\u002Fdiv>\n        <div class=\"ico\" id=\"bk\">≡<\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"deck\">\n        <div id=\"worker\" class=\"tile\" title=\"Upgrade Worker (W) — raises wallet cap &amp; money speed\">\n          <div class=\"we\">👷<\u002Fdiv><div class=\"wl\" id=\"wlv\">Lv.1<\u002Fdiv><div class=\"wc\" id=\"wcost\">↑200<\u002Fdiv>\n        <\u002Fdiv>\n        <div id=\"slots\"><\u002Fdiv>\n        <div id=\"cannon\" class=\"tile\" title=\"Cat Cannon (Space, or tap your base) — blast &amp; knock back the lane\">\n          <div class=\"cfill\" id=\"cfill\"><\u002Fdiv><div class=\"ce\">💥<\u002Fdiv><div class=\"cl\" id=\"cl\">CANNON 0%<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"ov\"><div id=\"ot\"><\u002Fdiv><div id=\"om\"><\u002Fdiv>\n      <div><button class=\"obtn\" id=\"ob1\">▶ Next<\u002Fbutton><button class=\"obtn sec\" id=\"ob3\">↻ Retry<\u002Fbutton><button class=\"obtn sec\" id=\"ob2\">Map<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"warn\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"hint\"><b>1–8<\u002Fb> deploy cats · <b>W<\u002Fb> upgrade worker · <b>Space<\u002Fb> / tap base = Cat Cannon · <b>F<\u002Fb> speed · <b>P<\u002Fb> pause<\u002Fdiv>\n\n<script>\nconst cv=document.getElementById('c'),cx=cv.getContext('2d');\nconst W=960,H=360,GY=290,PBX=70,EBX=W-70,PI=Math.PI;\n\nconst WALLET_MAX =[0, 800, 1300, 2000, 2900, 4000, 5400, 7200, 9999];\nconst FILL_PER_S =[0,  20,   32,   46,   62,   80,  102,  128,  160];\nconst UP_COST    =[0, 200,  450,  900, 1600, 2600, 4000, 6000];\nconst MAX_WLV=8;\nconst START_MONEY=150, PB_HP=5000;\nconst CANNON_FRAMES=1100, CANNON_DMG=400, CANNON_KB=14;\nconst KB_FRAMES=22, KB_POWER=9;\n\n// Roster styled after the classic Battle Cats \"Normal\" cats — cats dressed as\n// other animals, each with a clear role. Art is original (no game sprites used).\nconst CATS=[\n  {name:'Cat',       role:'Basic · all-rounder',     icon:'🐱',cost:60,  hp:220, atk:20, spd:2.2,range:140,cd:30, kb:3, body:'#FFFAE0',head:'#FFFAE0',belly:'#FFFFFF',ear:'#FFB8B8',eye:'#222',w:38,h:46},\n  {name:'Eraser Cat',role:'Tank · meatshield',       eraser:true,icon:'🧽',cost:90,  hp:2000,atk:8,  spd:1.0,range:60, cd:110,kb:1, body:'#F2EAD6',head:'#F2EAD6',belly:'#FFFFFF',ear:'#F0A0B0',eye:'#333',w:52,h:54},\n  {name:'Cow Cat',   role:'Rusher · fast & cheap',    cow:true,icon:'🐄',cost:90,  hp:200, atk:30, spd:4.0,range:80, cd:50, kb:3, body:'#F4F4F4',head:'#F4F4F4',belly:'#FFFFFF',ear:'#FFB8B8',eye:'#222',w:48,h:44},\n  {name:'Axe Cat',   role:'Brawler · melee power',    axe:true,icon:'🪓',cost:200, hp:520, atk:78, spd:2.3,range:100,cd:70, kb:3, body:'#E07050',head:'#F08060',belly:'#FFB088',ear:'#C04030',eye:'#222',w:40,h:50},\n  {name:'Bird Cat',  role:'Speedster · quick',        bird:true,icon:'🐦',cost:150, hp:300, atk:34, spd:4.4,range:120,cd:55, kb:4, body:'#50A0E0',head:'#68B8F8',belly:'#A0D8FF',ear:'#3878B8',eye:'#222',w:36,h:44},\n  {name:'Fish Cat',  role:'Striker · fast hitter',    fish:true,icon:'🐟',cost:240, hp:430, atk:60, spd:3.2,range:90, cd:70, kb:3, body:'#F0883A',head:'#F89A50',belly:'#FFD8A0',ear:'#C85E18',eye:'#222',w:42,h:46},\n  {name:'Dragon Cat',role:'Area · long range',        dragon:true,aoe:true,icon:'🐉',cost:320, hp:680, atk:62, spd:1.8,range:220,cd:95, kb:3, body:'#9B6AD6',head:'#A87CE6',belly:'#D0B0FF',ear:'#6A30A0',eye:'#222',w:46,h:54},\n  {name:'Titan Cat', role:'Heavy · slow juggernaut',  titan:true,aoe:true,icon:'🗿',cost:1200,hp:7000,atk:330,spd:0.6,range:140,cd:600,kb:1, body:'#7060A8',head:'#8070B8',belly:'#A090D0',ear:'#504880',eye:'#222',w:64,h:68},\n];\nconst ENEMIES=[\n  {name:'Doge',   hp:260, atk:16,spd:1.7,range:80, cd:60, kb:3, body:'#C8A030',head:'#DDB848',belly:'#F0D060',ear:'#AA8020',eye:'#222',w:40,h:50},\n  {name:'Snache', hp:130, atk:12,spd:3.4,range:60, cd:45, kb:4, snake:true,body:'#A07030',head:'#C09048',belly:'#D0A860',ear:'#806020',eye:'#222',w:30,h:42},\n  {name:'Squire', hp:620, atk:26,spd:1.5,range:90, cd:70, kb:3, squirrel:true,body:'#9B6B30',head:'#B07840',belly:'#E8C888',ear:'#D4845C',eye:'#222',w:46,h:54},\n  {name:'Pigge',  hp:440, atk:40,spd:2.2,range:80, cd:55, kb:3, pig:true,body:'#E89AAC',head:'#F2B0C0',belly:'#FFD8E2',ear:'#C0708A',eye:'#222',w:42,h:48},\n  {name:'Hippoe', hp:1900,atk:62,spd:0.9,range:70, cd:90, kb:1, hippo:true,body:'#9090C0',head:'#A8A8D8',belly:'#C0C8F0',ear:'#6870A0',eye:'#222',w:60,h:62},\n  {name:'Bun-Bun',hp:8000,atk:320,spd:0.7,range:200,cd:120,kb:2, boss:true,aoe:true,body:'#C840A0',head:'#E860C0',belly:'#FFB0D8',ear:'#A02080',eye:'#CC0055',w:92,h:82},\n];\nconst STAGES=[\n  {name:'Grassy Plains', icon:'🌱',diff:1,bHp:3000, mult:1.0, sky:['#7ec0ff','#aaddff','#d6f0ff'],gnd:['#54b341','#357a26','#1d4a12'],en:[{t:0,n:5,iv:160,d:120}]},\n  {name:'Sunny Beach',   icon:'🏖️',diff:1,bHp:4800, mult:1.15,sky:['#7fd0ff','#bfe8ff','#ffe9bf'],gnd:['#e6d18a','#c9ac5e','#9a7c3c'],en:[{t:0,n:4,iv:140,d:110},{t:1,n:4,iv:90,d:620}]},\n  {name:'Deep Forest',   icon:'🌲',diff:2,bHp:6500, mult:1.3, sky:['#2a7d32','#54a648','#82c86a'],gnd:['#3c8c30','#236320','#103d10'],en:[{t:2,n:4,iv:150,d:140},{t:0,n:5,iv:120,d:720}]},\n  {name:'Downtown',      icon:'🏙️',diff:3,bHp:8800, mult:1.5, sky:['#8fb8e0','#b8d2ea','#dce8f2'],gnd:['#7a8a6a','#566249','#36402c'],en:[{t:3,n:5,iv:110,d:140},{t:1,n:5,iv:80,d:640},{t:4,n:1,iv:1,d:1180}]},\n  {name:'Frost Peak',    icon:'🏔️',diff:4,bHp:11500,mult:1.7, sky:['#cfe9ff','#a8caea','#7fa3c6'],gnd:['#cfe0ef','#a3b6c8','#74808f'],en:[{t:4,n:2,iv:400,d:140},{t:2,n:5,iv:110,d:620},{t:3,n:6,iv:90,d:1240}]},\n  {name:'Doom Castle',   icon:'🏰',diff:5,bHp:16000,mult:1.95,boss:true,sky:['#2a0c20','#3a1230','#4c1a40'],gnd:['#3a1830','#241020','#120810'],en:[{t:0,n:8,iv:100,d:140},{t:2,n:4,iv:150,d:820},{t:5,n:1,iv:1,d:1450},{t:3,n:6,iv:95,d:1900}]},\n];\n\nlet G={},uid=0,gspd=1,curStage=0;\nlet cleared=new Set();try{cleared=new Set(JSON.parse(localStorage.getItem('bc_cleared')||'[]'));}catch(e){}\nfunction playable(i){return i===0||cleared.has(i-1);}\nfunction saveProgress(){try{localStorage.setItem('bc_cleared',JSON.stringify([...cleared]));}catch(e){}}\n\nfunction initGame(si){\n  curStage=si; const st=STAGES[si]; uid=0;\n  G={money:START_MONEY,wlv:1,pb:{x:PBX,hp:PB_HP,maxHp:PB_HP},eb:{x:EBX,hp:st.bHp,maxHp:st.bHp},\n    cats:[],enemies:[],parts:[],projs:[],floats:[],shocks:[],cds:new Array(CATS.length).fill(0),\n    cannon:0,frame:0,shk:0,camX:0,tcamX:0,warnA:0,warnTxt:'',warnCol:'#fff',over:false,won:false,paused:false,\n    spawnQ:[],wt:0,stage:st};\n  for(const e of st.en)for(let i=0;i<e.n;i++)G.spawnQ.push({t:e.t,frame:e.d+i*e.iv});\n  G.spawnQ.sort((a,b)=>a.frame-b.frame);\n  document.getElementById('ov').classList.remove('on');\n  document.getElementById('warn').style.opacity=0;\n  document.getElementById('pausetag').style.display='none';\n  buildButtons(); showScreen('game');\n}\n\n// small color helper for shading (expects #rrggbb)\nfunction shade(hex,amt){const h=hex.replace('#','');const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);const c=v=>Math.max(0,Math.min(255,v+amt));return 'rgb('+c(r)+','+c(g)+','+c(b)+')';}\n\n// ── UNIT ──\nclass Unit{\n  constructor(def,x,isP,mult){\n    this.id=uid++;this.def=def;this.x=x;this.isP=isP;\n    const m=mult||1;\n    this.maxHp=Math.round(def.hp*m);this.hp=this.maxHp;this.atk=Math.round(def.atk*m);\n    this.kb=def.kb||1;this.kbDone=0;this.stun=0;this.stunMax=KB_FRAMES;\n    this.atkT=0;this.hitT=0;this.atkA=0;this.atkMax=16;this.kbv=0;this.kbY=0;\n    this.moving=0;this.breathe=Math.random()*PI*2;this.spawnT=12;this.poof=0;\n    this.dying=false;this.dead=false;this.dieT=0;\n    this.dir=isP?1:-1;this.wa=Math.random()*PI*2;this.row=Math.floor(Math.random()*3);\n  }\n  nearest(arr){let b=null,bd=1e9;for(const u of arr){if(u.dead||u.dying)continue;const d=Math.abs(u.x-this.x);if(d<bd){bd=d;b=u;}}return b;}\n  inRange(t){return Math.abs(t.x-this.x)<=this.def.range;}\n  applyKb(power){this.kbv=-this.dir*(power||KB_POWER);this.stun=KB_FRAMES;this.stunMax=KB_FRAMES;}\n  update(tgts){\n    if(this.dead)return;\n    if(this.dying){this.dieT--;if(this.dieT<=0)this.dead=true;return;}\n    this.atkT=Math.max(0,this.atkT-1);this.hitT=Math.max(0,this.hitT-1);this.atkA=Math.max(0,this.atkA-1);\n    this.breathe+=0.09;if(this.spawnT>0)this.spawnT--;\n    if(this.stun>0){this.stun--;this.x+=this.kbv;this.kbv*=.84;this.kbY=Math.sin((1-this.stun/this.stunMax)*PI)*16;this.moving=0;this.clamp();return;}\n    this.kbY=0;\n    const hb=this.isP?G.eb:G.pb;\n    const nr=this.nearest(tgts);\n    const iru=nr&&this.inRange(nr);\n    const irb=Math.abs(hb.x-this.x)<=this.def.range;\n    if(iru||irb){\n      this.moving=0;\n      if(this.atkT<=0){this.atkT=this.def.cd;this.atkA=this.atkMax;\n        if(iru){if(this.def.aoe){for(const t of tgts)if(!t.dead&&!t.dying&&this.inRange(t))t.damage(this.atk);}else nr.damage(this.atk);}\n        else{hb.hp=Math.max(0,hb.hp-this.atk);G.shk=this.isP?3:7;}}\n    }else{this.moving=1;this.x+=this.dir*this.def.spd;this.wa+=Math.min(this.def.spd,2.4)*.22;this.clamp();}\n  }\n  clamp(){if(this.isP)this.x=Math.max(PBX-12,Math.min(this.x le=d.body;ctx.strokeStyle=OL;ctx.lineWidth=LW;\n  ctx.beginPath();ctx.ellipse(0,bR*.78,bR*.92,bR*.82,0,0,PI*2);ctx.fill();ctx.stroke();\n  ctx.fillStyle=d.belly;ctx.strokeStyle='transparent';ctx.beginPath();ctx.ellipse(0,bR*.9,bR*.48,bR*.52,0,0,PI*2);ctx.fill();ctx.strokeStyle=OL;\n  // ears\n  [[-1],[1]].forEach(([s])=>{\n    ctx.fillStyle=d.head;ctx.lineWidth=LW;ctx.beginPath();ctx.moveTo(s*hR*.5,-hR*.7);ctx.lineTo(s*hR*.98,-hR*1.62);ctx.lineTo(s*hR*.04,-hR*.92);ctx.closePath();ctx.fill();ctx.stroke();\n    ctx.fillStyle=d.ear;ctx.strokeStyle='transparent';ctx.beginPath();ctx.moveTo(s*hR*.46,-hR*.8);ctx.lineTo(s*hR*.8,-hR*1.32);ctx.lineTo(s*hR*.16,-hR*1.0);ctx.closePath();ctx.fill();ctx.strokeStyle=OL;\n  });\n  // head\n  ctx.fillStyle=d.head;ctx.beginPath();ctx.arc(0,-hR*.25,hR,0,PI*2);ctx.fill();ctx.stroke();\n  // eyes\n  ctx.fillStyle=d.eye;ctx.beginPath();ctx.arc(-hR*.34,-hR*.3,hR*.14,0,PI*2);ctx.fill();ctx.beginPath();ctx.arc(hR*.34,-hR*.3,hR*.14,0,PI*2);ctx.fill();\n  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-hR*.29,-hR*.37,hR*.05,0,PI*2);ctx.fill();ctx.beginPath();ctx.arc(hR*.39,-hR*.37,hR*.05,0,PI*2);ctx.fill();\n  // ω mouth\n  ctx.strokeStyle='#333';ctx.lineWidth=1.8;const my=-hR*.02;\n  ctx.beginPath();ctx.moveTo(-hR*.2,my);ctx.quadraticCurveTo(-hR*.1,my+hR*.16,0,my);ctx.quadraticCurveTo(hR*.1,my+hR*.16,hR*.2,my);ctx.stroke();ctx.strokeStyle=OL;ctx.lineWidth=LW;\n  // per-cat flair\n  if(d.cow){ctx.fillStyle='#222';ctx.strokeStyle='transparent';ctx.beginPath();ctx.ellipse(-bR*.25,bR*.7,bR*.2,bR*.16,.3,0,PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(bR*.32,bR*.95,bR*.16,bR*.13,0,0,PI*2);ctx.fill();ctx.fillStyle='#F5E080';ctx.strokeStyle=OL;[[-1],[1]].forEach(([s])=>{ctx.beginPath();ctx.moveTo(s*hR*.55,-hR*.55);ctx.lineTo(s*hR*.95,-hR*.85);ctx.lineTo(s*hR*.5,-hR*.78);ctx.closePath();ctx.fill();ctx.stroke();});}\n  if(d.eraser){ctx.fillStyle='#ff9bb5';ctx.strokeStyle=OL;ctx.lineWidth=LW;ctx.beginPath();ctx.roundRect(-bR*.5,bR*.35,bR*1.0,bR*.7,5);ctx.f y.addColorStop(1,s.sky[2]);cx.fillStyle=sky;cx.fillRect(0,0,W,GY);\n  const cl=(G.camX*.15)%300;cx.fillStyle='rgba(255,255,255,.5)';\n  for(const[bx,byy,r]of[[120,55,26],[420,40,32],[700,70,24],[880,48,30],[260,90,20]]){const x=((bx-cl)%(W+120)+W+120)%(W+120)-60;cx.beginPath();cx.arc(x,byy,r,0,PI*2);cx.arc(x+r*.9,byy+4,r*.8,0,PI*2);cx.arc(x-r*.9,byy+4,r*.7,0,PI*2);cx.fill();}\n  const ms=G.camX*.3;cx.fillStyle='rgba(0,0,0,.15)';cx.beginPath();cx.moveTo(0,GY);\n  for(let i=0;i<=12;i++){const x=i*90-(ms%180);cx.lineTo(x,GY-70-Math.sin(i*1.3)*45);}cx.lineTo(W,GY);cx.fill();\n  const gnd=cx.createLinearGradient(0,GY,0,H);gnd.addColorStop(0,s.gnd[0]);gnd.addColorStop(.12,s.gnd[1]);gnd.addColorStop(1,s.gnd[2]);cx.fillStyle=gnd;cx.fillRect(0,GY,W,H-GY);\n  cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,GY+2);cx.lineTo(W,GY+2);cx.stroke();\n}\nfunction drawBase(b,isP){\n  const bx=b.x-G.camX,by=GY;const dark=isP?'#1a2470':'#701818',mid=isP?'#283298':'#982020';\n  cx.fillStyle=dark;cx.fillRect(bx-38,by-118,76,118);cx.fillStyle=mid;cx.fillRect(bx-32,by-112,64,108);\n  for(let i=0;i<5;i++){cx.fillStyle=dark;cx.fillRect(bx-32+i*16,by-122,11,14);}\n  cx.strokeStyle='rgba(0,0,0,.28)';cx.lineWidth=1;\n  for(let r=0;r<5;r++){const ry=by-22-r*19;cx.beginPath();cx.moveTo(bx-32,ry);cx.lineTo(bx+32,ry);cx.stroke();const off=r%2?8:0;for(let c=0;c<4;c++){cx.beginPath();cx.moveTo(bx-32+off+c*16,ry);cx.lineTo(bx-32+off+c*16,ry+19);cx.stroke();}}\n  cx.fillStyle='#060610';cx.beginPath();cx.rect(bx-13,by-40,26,40);cx.fill();cx.beginPath();cx.arc(bx,by-40,13,PI,0);cx.fill();\n  cx.fillStyle='#060610';cx.fillRect(bx-11,by-90,22,22);\n  cx.fillStyle=`rgba(255,${isP?190:70},${isP?70:70},${.5+.5*Math.sin(G.frame*.055+(!isP?1:0))})`;cx.fillRect(bx-9,by-88,18,18);\n  const fw=Math.sin(G.frame*.088)*7;cx.strokeStyle='#888';cx.lineWidth=2;cx.beginPath();cx.moveTo(bx,by-118);cx.lineTo(bx,by-150);cx.stroke();\n  cx.fillStyle=isP?'#3378FF':'#FF3322';cx.beginPath();cx.moveTo(bx,by-150);cx.lineTo(bx+24+fw,by-141);cx.lineTo(bx,by-132);cx.fill();\n  cx.fillStyle='white';cx.font='bold 11px Arial';cx.textAlign='center';cx.fillText(isP?'🐱':'💀',bx+11+fw*.5,by-137);\n  // local base hp bar\n  const p=Math.max(0,b.hp/b.maxHp),bw=88,barX=bx-bw/2,barY=by-172;\n  cx.fillStyle='rgba(0,0,0,.72)';cx.fillRect(barX-1,barY-1,bw+2,9);\n  cx.fillStyle=p>.5?'#44CC44':p>.25?'#CCAA00':'#CC2020';cx.fillRect(barX,barY,bw*p,7);\n  cx.fillStyle='white';cx.font='10px Arial';cx.textAlign='center';cx.fillText(Math.ceil(p*100)+'%',bx,barY+15);\n  // cat cannon charge gauge above the player base\n  if(isP){\n    const cg=G.cannon,gx=bx-30,gy=by-192,gw=60;\n    cx.fillStyle='rgba(0,0,0,.55)';roundRectP(gx-2,gy-2,gw+4,8,4);cx.fill();\n    cx.fillStyle=cg>=1?'#ff7adf':'#a86ad6';roundRectP(gx,gy,gw*cg,4,2);cx.fill();\n    if(cg>=1){cx.fillStyle='#ffd24a';cx.font='bold 9px '+'Arial';cx.fillText('⚡ TAP TO FIRE',bx,gy-4);}\n  }\n}\nfunction roundRectP(x,y,w,h,r){cx.beginPath();cx.roundRect(x,y,Math.max(0,w),h,r);}\n\n// ── UPDATE ──\nfunction update(){\n  if(G.over||G.paused)return;\n  G.frame++;G.wt++;\n  const cap=WALLET_MAX[G.wlv];G.money=Math.min(cap,G.money+FILL_PER_S[G.wlv]/60);\n  if(G.cannon<1)G.cannon=Math.min(1,G.cannon+1/CANNON_FRAMES);\n  while(G.spawnQ.length&&G.wt>=G.spawnQ[0].frame){const e=G.spawnQ.shift(),def=ENEMIES[e.t];G.enemies.push(new Unit(def,EBX-55,false,G.stage.mult));if(def.boss)showWarn('⚠ '+def.name.toUpperCase()+' INCOMING! ⚠','#ff4fb0');}\n  for(const c of G.cats)c.update(G.enemies);\n  for(const e of G.enemies)e.update(G.cats);\n  for(let i=G.shocks.length-1;i>=0;i--){const s=G.shocks[i];s.x+=11;for(const e of G.enemies){if(e.dead||e.dying||s.hit.has(e.id))continue;if(Math.abs(e.x-s.x)<46){e.damage(CANNON_DMG);e.applyKb(CANNON_KB);s.hit.add(e.id);spawnParts(e.x,GY-30,'#ff7adf',6);}}if(s.x>EBX+40)G.shocks.splice(i,1);}\n  for(let i=G.cats.length-1;i>=0;i--)if(G.cats[i].dead)G.cats.splice(i,1);\n  for(let i=G.enemies.length-1;i>=0;i--)if(G.enemies[i].dead)G.enemies.splice(i,1);\n  for(let i=G.parts.length-1;i>=0;i--){const p=G.parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;if(p.life<=0)G.parts.splice(i,1);}\n  for(let i=G.floats.length-1;i>=0;i--){const f=G.floats[i];f.y-=.9;f.life--;if(f.life<=0)G.floats.splice(i,1);}\n  G.shk*=.7;if(G.shk<.4)G.shk=0;\n  for(let i=0;i<G.cds.length;i++)G.cds[i]=Math.max(0,G.cds[i]-1);\n  if(G.pb.hp<=0){endGame(false);return;}\n  if(G.eb.hp<=0){endGame(true);return;}\n  let fx=PBX+260;for(const c of G.cats)if(!c.dying)fx=Math.max(fx,c.x);for(const e of G.enemies)if(!e.dying)fx=Math.min(fx,e.x);\n  G.tcamX=Math.max(0,Math.min(fx-W/2,EBX-W+150));G.camX+=(G.tcamX-G.camX)*.05;\n  if(G.warnA>0)G.warnA=Math.max(0,G.warnA-.012);\n}\n\n// ── DRAW ──\nfunction draw(){\n  cx.save();if(G.shk>0)cx.translate(Math.sin(G.frame*1.5)*G.shk,0);\n  drawBg();drawBase(G.pb,true);drawBase(G.eb,false);\n  const all=[...G.cats,...G.enemies].sort((a,b)=>b.row-a.row);for(const u of all)u.draw();\n  for(const s of G.shocks){const sx=s.x-G.camX;for(let r=0;r<3;r++){cx.strokeStyle=`rgba(255,122,223,${.7-r*.2})`;cx.lineWidth=4-r;cx.beginPath();cx.arc(sx-r*18,GY-44,38-r*4,PI*.4,PI*1.6);cx.stroke();}}\n  for(const p of G.parts){cx.globalAlpha=p.life/p.max;cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x-G.camX,p.y,p.sz,0,PI*2);cx.fill();}\n  cx.globalAlpha=1;cx.textAlign='center';\n  for(const f of G.floats){const a=f.life/55;cx.globalAlpha=a;cx.fillStyle=f.col;cx.font=`800 ${13+Math.floor((1-a)*5)}px 'Baloo 2',Arial`;cx.fillText(f.txt,f.x-G.camX,f.y);}\n  cx.globalAlpha=1;cx.restore();\n  drawTopHud();\n  const wd=document.getElementById('warn');if(G.warnA>0){wd.style.opacity=G.warnA;wd.textContent=G.warnTxt;wd.style.color=G.warnCol;wd.style.textShadow='0 0 20px '+G.warnCol+',0 3px 0 #0008';}else wd.style.opacity=0;\n}\n// big enemy-base HP bar across the top (the signature Battle Cats HUD piece)\nfunction drawTopHud(){\n  const eb=G.eb,p=Math.max(0,eb.hp/eb.maxHp);\n  const x=W*0.17,y=12,w=W*0.66,h=20,r=10;\n  cx.save();\n  cx.fillStyle='rgba(8,12,22,.55)';cx.beginPath();cx.roundRect(x-26,y-4,w+52,h+8,14);cx.fill();\n  // track\n  cx.fillStyle='#2a0d18';cx.beginPath();cx.roundRect(x,y,w,h,r);cx.fill();\n  // fill\n  const g=cx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'#ff8a8a');g.addColorStop(.5,'#ff3b3b');g.addColorStop(1,'#c00');\n  cx.fillStyle=g;cx.beginPath();cx.roundRect(x,y,Math.max(0,w*p),h,r);cx.fill();\n  // gloss\n  cx.fillStyle='rgba(255,255,255,.18)';cx.beginPath();cx.roundRect(x,y+2,w*p,h*.4,r);cx.fill();\n  cx.strokeStyle='rgba(255,255,255,.6)';cx.lineWidth=2;cx.beginPath();cx.roundRect(x,y,w,h,r);cx.stroke();\n  // labels\n  cx.fillStyle='#fff';cx.textAlign='left';cx.font=\"800 13px 'Baloo 2',Arial\";cx.fillText((G.stage.boss?'👹 ':'🏰 ')+'ENEMY BASE',x+8,y+h-5);\n  cx.textAlign='right';cx.font=\"800 14px 'Baloo 2',Arial\";cx.fillText(Math.ceil(p*100)+'%',x+w-8,y+h-5);\n  // wave timer pip\n  cx.restore();\n}\n\n// ── UI ──\nfunction updateUI(){\n  const cap=WALLET_MAX[G.wlv];\n  document.getElementById('mv').textContent=Math.floor(G.money);\n  document.getElementById('mcap').textContent='/'+cap;\n  document.getElementById('mfill').style.width=(G.money/cap*100)+'%';\n  document.getElementById('wlv').textContent='Lv.'+G.wlv;\n  const wbtn=document.getElementById('worker');\n  if(G.wlv>=MAX_WLV){document.getElementById('wcost').textContent='MAX';wbtn.classList.add('max');wbtn.classList.remove('ok');}\n  else{const c=UP_COST[G.wlv];document.getElementById('wcost').textContent='↑'+c;wbtn.classList.toggle('ok',G.money>=c);}\n  const cReady=G.cannon>=1;\n  document.getElementById('cfill').style.height=(G.cannon*100)+'%';\n  document.getElementById('cl').textContent=cReady?'FIRE!':'CANNON '+Math.floor(G.cannon*100)+'%';\n  document.getElementById('cannon').classList.toggle('ready',cReady);\n  document.querySelectorAll('.cat').forEach((btn,i)=>{\n    const d=CATS[i],cd=G.cds[i],ok=G.money>=d.cost&&cd<=0;\n    btn.classList.toggle('ok',ok);btn.classList.toggle('no',!ok);\n    btn.querySelector('.cool').style.setProperty('--deg',(cd>0?(cd/d.cd)*360:0)+'deg');\n  });\n}\nfunction showWarn(msg,col){G.warnTxt=msg;G.warnA=1;G.warnCol=col||'#fff';}\nfunction spawnCat(i){if(G.over||G.paused||i>=CATS.length)return;const d=CATS[i];if(G.money<d.cost||G.cds[i]>0)return;G.money-=d.cost;G.cds[i]=d.cd;G.cats.push(new Unit(d,PBX+70,true,1));}\nfunction upgradeWorker(){if(G.over||G.paused||G.wlv>=MAX_WLV)return;const c=UP_COST[G.wlv];if(G.money<c)return;G.money-=c;G.wlv++;G.floats.push({x:G.camX+PBX+60,y:GY-110,txt:'WORKER Lv.'+G.wlv,life:55,col:'#9bffb4'});}\nfunction togglePause(){if(G.over)return;G.paused=!G.paused;document.getElementById('pausetag').style.display=G.paused?'block':'none';document.getElementById('pause').textContent=G.paused?'▶':'⏸';}\nfunction endGame(won){G.over=true;if(won){cleared.add(curStage);saveProgress();}\n  document.getElementById('ot').textContent=won?'🏆 VICTORY!':'💀 DEFEAT';\n  document.getElementById('ot').style.color=won?'#ffd24a':'#ff6a6a';\n  document.getElementById('om').textContent=won?STAGES[curStage].name+' cleared!':'Your base was destroyed.';\n  document.getElementById('ob1').style.display=won&&curStage<STAGES.length-1?'':'none';\n  document.getElementById('ov').classList.add('on');}\nfunction buildButtons(){\n  const s=document.getElementById('slots');s.innerHTML='';\n  CATS.forEach((d,i)=>{\n    const b=document.createElement('div');b.className='cat tile no';\n    b.innerHTML=`<span class=\"kx\">${i+1}<\u002Fspan><div class=\"port\"><canvas width=\"54\" height=\"44\"><\u002Fcanvas><\u002Fdiv><div class=\"cnm\">${d.name}<\u002Fdiv><div class=\"cost\">🪙${d.cost}<\u002Fdiv><div class=\"cool\"><\u002Fdiv>`;\n    b.title=`${d.name} — ${d.role}\\nHP ${d.hp} · ATK ${d.atk} · ${d.aoe?'Area attack':'Single target'} · ${d.kb} knockbacks`;\n    b.addEventListener('click',()=>spawnCat(i));\n    s.appendChild(b);\n    paintPortrait(b.querySelector('canvas').getContext('2d'),d);\n  });\n}\n// Battle-Cats-style world map: stages are nodes strung along a winding road.\nfunction buildMap(){\n  const N=STAGES.length,pad=78,w=920-2*pad;\n  const pts=STAGES.map((s,i)=>({x:pad+(N>1?w*i/(N-1):0),y:168+Math.sin(i*1.05+0.4)*86}));\n  let road='M'+pts[0].x.toFixed(1)+' '+pts[0].y.toFixed(1);\n  for(let i=1;i<N;i++){const a=pts[i-1],b=pts[i],mx=((a.x+b.x)/2).toFixed(1);road+=` C ${mx} ${a.y.toFixed(1)} ${mx} ${b.y.toFixed(1)} ${b.x.toFixed(1)} ${b.y.toFixed(1)}`;}\n  let svg='<svg viewBox=\"0 0 920 332\" preserveAspectRatio=\"xMidYMid slice\">';\n  svg+='<defs><linearGradient id=\"mapsky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#8fd0ff\"/><stop offset=\"1\" stop-color=\"#cdeeff\"/><\u002FlinearGradient><\u002Fdefs>';\n  svg+='<rect width=\"920\" height=\"332\" fill=\"url(#mapsky)\"/>';\n  svg+='<path d=\"M0 332 L0 210 Q230 150 460 210 T920 200 L920 332 Z\" fill=\"#7fc95c\" opacity=\".75\"/>';\n  svg+='<path d=\"M0 332 L0 255 Q300 205 600 252 T920 248 L920 332 Z\" fill=\"#4ea83a\"/>';\n  // road\n  svg+=`<path d=\"${road}\" fill=\"none\" stroke=\"#caa15a\" stroke-width=\"18\" stroke-linecap=\"round\"/>`;\n  svg+=`<path d=\"${road}\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3\" stroke-dasharray=\"2 14\" stroke-linecap=\"round\" opacity=\".9\"/>`;\n  // nodes\n  pts.forEach((p,i)=>{\n    const s=STAGES[i],cl=cleared.has(i),pl=playable(i);\n    const fill=cl?'#46c25e':pl?(s.boss?'#e85a5a':'#ffce4a'):'#9aa3ad';\n    const ring=s.boss?'#a02828':'#fff';\n    svg+=`<g class=\"node ${pl?'':'locked'}\" data-i=\"${i}\" transform=\"translate(${p.x.toFixed(1)},${p.y.toFixed(1)})\">`;\n    svg+=`<ellipse cx=\"0\" cy=\"30\" rx=\"24\" ry=\"6\" fill=\"rgba(0,0,0,.18)\"/>`;\n    svg+=`<circle class=\"nb\" r=\"27\" fill=\"${fill}\" stroke=\"${ring}\" stroke-width=\"4\"/>`;\n    svg+=`<text y=\"9\" text-anchor=\"middle\" font-size=\"26\">${pl?s.icon:'🔒'}<\u002Ftext>`;\n    svg+=`<circle cx=\"-20\" cy=\"-20\" r=\"11\" fill=\"#2a4a8c\" stroke=\"#fff\" stroke-width=\"2\"/><text x=\"-20\" y=\"-15\" text-anchor=\"middle\" font-size=\"12\" fill=\"#fff\" font-weight=\"800\">${i+1}<\u002Ftext>`;\n    if(cl)svg+=`<circle cx=\"21\" cy=\"-19\" r=\"9\" fill=\"#1c8c3c\" stroke=\"#fff\" stroke-width=\"2\"/><text x=\"21\" y=\"-15\" text-anchor=\"middle\" font-size=\"11\" fill=\"#fff\" font-weight=\"800\">✓<\u002Ftext>`;\n    svg+=`<text y=\"48\" text-anchor=\"middle\" font-size=\"13\" font-weight=\"800\" fill=\"#1c3a14\" stroke=\"#fff\" stroke-width=\"3\" paint-order=\"stroke\">${s.name}<\u002Ftext>`;\n    svg+=`<text y=\"63\" text-anchor=\"middle\" font-size=\"11\" font-weight=\"800\" fill=\"${s.boss?'#b33':'#8a5a12'}\" stroke=\"#fff\" stroke-width=\"2.5\" paint-order=\"stroke\">${'★'.repeat(s.diff)}${'☆'.repeat(5-s.diff)}${s.boss?' BOSS':''}<\u002Ftext>`;\n    svg+=`<\u002Fg>`;\n  });\n  // your cat marker hops on the current (next playable, uncleared) stage\n  const cur=STAGES.findIndex((s,i)=>playable(i)&&!cleared.has(i));\n  if(cur>=0)svg+=`<text x=\"${pts[cur].x.toFixed(1)}\" y=\"${(pts[cur].y-38).toFixed(1)}\" text-anchor=\"middle\" font-size=\"24\">🐱<\u002Ftext>`;\n  svg+='<\u002Fsvg>';\n  const m=document.getElementById('map');m.innerHTML=svg;\n  m.querySelectorAll('.node').forEach(g=>{const i=+g.dataset.i;if(playable(i))g.addEventListener('click',()=>initGame(i));});\n}\nfunction showScreen(s){['sel','game'].forEach(id=>document.getElementById(id).classList.toggle('on',id===s));}\n\n// ── EVENTS ──\ndocument.getElementById('worker').addEventListener('click',upgradeWorker);\ndocument.getElementById('cannon').addEventListener('click',fireCannon);\ndocument.getElementById('pause').addEventListener('click',togglePause);\ndocument.getElementById('bk').addEventListener('click',()=>{buildMap();showScreen('sel');});\ndocument.getElementById('ob1').addEventListener('click',()=>initGame(Math.min(STAGES.length-1,curStage+1)));\ndocument.getElementById('ob2').addEventListener('click',()=>{buildMap();showScreen('sel');});\ndocument.getElementById('ob3').addEventListener('click',()=>initGame(curStage));\ndocument.getElementById('spd').addEventListener('click',()=>{gspd=gspd===1?2:1;const b=document.getElementById('spd');b.textContent=gspd===2?'»2×':'▶1×';b.classList.toggle('fast',gspd===2);});\ncv.addEventListener('click',ev=>{const rect=cv.getBoundingClientRect();const x=(ev.clientX-rect.left)*(W/rect.width);if(Math.abs(x-(PBX-G.camX))<74)fireCannon();});\ndocument.addEventListener('keydown',e=>{\n  if(!document.getElementById('game').classList.contains('on'))return;\n  if(e.key>='1'&&e.key<='8')spawnCat(+e.key-1);\n  else if(e.key===' '){e.preventDefault();fireCannon();}\n  else if(e.key.toLowerCase()==='w')upgradeWorker();\n  else if(e.key.toLowerCase()==='f')document.getElementById('spd').click();\n  else if(e.key.toLowerCase()==='p')togglePause();\n});\n\n// ── LOOP ──\nfunction loop(){\n  if(document.getElementById('game').classList.contains('on')&&G.stage){\n    if(!G.paused)for(let i=0;i<gspd;i++)update();\n    draw();updateUI();\n  }\n  requestAnimationFrame(loop);\n}\nbuildMap();loop();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
