<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galaxy Conquest — Jedi vs Sith</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   GALAXY CONQUEST — Holographic tactical readout
   Visual tokens ported verbatim from project/styles/holo.css
   ============================================================ */
:root{
  --void:#04070d; --void-2:#060c15;
  --panel:rgba(10,20,34,0.72); --panel-solid:#0a1422;
  --line:rgba(95,220,255,0.16); --line-strong:rgba(95,220,255,0.42);
  --holo:#5fdcff; --holo-bright:#aef2ff; --holo-dim:rgba(95,220,255,0.55); --holo-faint:rgba(95,220,255,0.10);
  --jedi:#4aa3ff; --jedi-glow:#8cc6ff; --jedi-deep:#173a63;
  --sith:#ff3447; --sith-glow:#ff7484; --sith-deep:#5e1119;
  --manda:#e0a64b; --manda-glow:#ffd083;
  --neutral:#8fa3b4; --neutral-glow:#c2d2de;
  --ink:#e8f4fc; --ink-dim:#aac3d6; --ink-faint:#829bb0;   /* §6.4 — canonical brightened text tokens (holo.css); no washed-out grays */
  --gold:#f3d27a;
  --font-ui:'Chakra Petch', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{ font-family:var(--font-ui); color:var(--ink); background:var(--void);
  -webkit-font-smoothing:antialiased; letter-spacing:0.01em; overflow:hidden; }
#app{ width:100vw; height:100vh; position:relative; }

.starfield{ position:absolute; inset:0; overflow:hidden;
  background:
    radial-gradient(120% 90% at 78% 8%, rgba(74,163,255,0.10), transparent 55%),
    radial-gradient(120% 90% at 12% 96%, rgba(255,52,71,0.07), transparent 55%),
    radial-gradient(100% 100% at 50% 50%, #07101d 0%, #04070d 70%, #02040a 100%); }
.starfield::before{ content:""; position:absolute; inset:-50%;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(215,236,248,0.9), transparent),
    radial-gradient(1px 1px at 70% 60%, rgba(215,236,248,0.7), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(143,163,180,0.7), transparent),
    radial-gradient(1px 1px at 88% 22%, rgba(215,236,248,0.6), transparent),
    radial-gradient(1px 1px at 55% 12%, rgba(215,236,248,0.5), transparent),
    radial-gradient(1px 1px at 12% 70%, rgba(143,163,180,0.6), transparent),
    radial-gradient(1px 1px at 33% 48%, rgba(215,236,248,0.5), transparent),
    radial-gradient(1px 1px at 95% 78%, rgba(143,163,180,0.5), transparent);
  background-size:340px 340px,280px 280px,420px 420px,300px 300px,500px 500px,360px 360px,240px 240px,460px 460px;
  opacity:.6; animation:drift 220s linear infinite; }
@keyframes drift{ to{ transform:translate(40px,-30px);} }
.holo-grid{ position:absolute; inset:0; pointer-events:none;
  background-image:linear-gradient(var(--holo-faint) 1px, transparent 1px),linear-gradient(90deg, var(--holo-faint) 1px, transparent 1px);
  background-size:44px 44px,44px 44px;
  -webkit-mask-image:radial-gradient(120% 100% at 50% 50%, #000 35%, transparent 85%);
  mask-image:radial-gradient(120% 100% at 50% 50%, #000 35%, transparent 85%); }
.scanlines{ position:absolute; inset:0; pointer-events:none; opacity:.5;
  background:repeating-linear-gradient(to bottom, rgba(95,220,255,0.035) 0 1px, transparent 1px 3px); mix-blend-mode:screen; }

.panel{ position:relative; background:linear-gradient(180deg, rgba(18,32,52,0.78), rgba(7,14,24,0.82));
  border:1px solid var(--line); backdrop-filter:blur(2px); }
.brackets::before,.brackets::after{ content:""; position:absolute; width:14px; height:14px; pointer-events:none; border:1.5px solid var(--line-strong); }
.brackets::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
.brackets::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }
.eyebrow{ font-size:10px; letter-spacing:.34em; text-transform:uppercase; color:var(--holo); font-weight:600; }
.mono{ font-family:var(--font-mono); } .tnum{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.glow-cy{ text-shadow:0 0 12px rgba(95,220,255,.55); }
.glow-bl{ text-shadow:0 0 12px rgba(74,163,255,.6); }
.glow-rd{ text-shadow:0 0 12px rgba(255,52,71,.6); }
.chip{ display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border:1px solid var(--line); border-radius:2px;
  font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-dim); font-weight:500; }
.divider{ height:1px; background:linear-gradient(90deg,transparent,var(--line-strong),transparent); }
.t-jedi{ color:var(--jedi);} .t-sith{ color:var(--sith);} .t-manda{ color:var(--manda);} .t-neutral{ color:var(--neutral);}
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--line-strong); }
::-webkit-scrollbar-track{ background:transparent; }

button{ font-family:var(--font-ui); cursor:pointer; color:inherit; }
.btn{ font-size:12.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-dim);
  background:transparent; border:1px solid var(--line); padding:11px 18px; transition:.15s; }
.btn:hover{ color:var(--ink); border-color:var(--line-strong); }
.btn.primary{ color:#eaf6ff; }
.btn.jedi{ background:rgba(74,163,255,.16); border-color:var(--jedi); box-shadow:0 0 16px rgba(74,163,255,.22); }
.btn.jedi:hover{ background:rgba(74,163,255,.28); }
.btn.sith{ background:rgba(255,52,71,.16); border-color:var(--sith); box-shadow:0 0 16px rgba(255,52,71,.22); }
.btn.sith:hover{ background:rgba(255,52,71,.28); }
.btn.gold{ color:var(--gold); border-color:var(--gold); }
.btn:disabled{ opacity:.34; cursor:not-allowed; box-shadow:none; }

.topbar{ position:absolute; top:0; left:0; right:0; height:60px; z-index:20; display:flex; align-items:center;
  justify-content:space-between; padding:0 20px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(6,12,21,.95),rgba(6,12,21,.55)); }
.aside{ position:absolute; top:60px; bottom:72px; width:238px; z-index:15; padding:16px 14px;
  display:flex; flex-direction:column; gap:12px; overflow-y:auto;
  background:linear-gradient(180deg,rgba(8,16,28,.82),rgba(5,10,18,.74)); }
.aside.left{ left:0; border-right:1px solid var(--line); }
.aside.right{ right:0; width:264px; border-left:1px solid var(--line); }
.center{ position:absolute; top:60px; left:238px; right:264px; bottom:72px; overflow:hidden; }
.bottombar{ position:absolute; bottom:0; left:0; right:0; height:72px; z-index:18; display:flex; align-items:center;
  justify-content:space-between; padding:0 18px; border-top:1px solid var(--line);
  background:linear-gradient(0deg,rgba(6,12,21,.96),rgba(6,12,21,.5)); gap:16px; }

.statrow{ display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
.statrow .lab{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-dim); }
.statrow .val{ font-size:15px; font-weight:700; }

.phases{ display:flex; align-items:center; gap:0; }
.phase{ display:flex; align-items:center; gap:7px; padding:6px 13px; border:1px solid var(--line); color:var(--ink-faint); }
.phase .pn{ font-family:var(--font-mono); font-size:10px; opacity:.7; }
.phase .pl{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; font-weight:600; }
.phase.active{ background:rgba(74,163,255,.12); border-color:var(--jedi); color:var(--jedi-glow); }
.phase.active.sith{ background:rgba(255,52,71,.12); border-color:var(--sith); color:var(--sith-glow); }
.phsep{ width:14px; height:1px; background:var(--line); }

.planet{ position:absolute; transform:translate(-50%,-50%); background:none; border:none; padding:0; }
.planet .ring{ position:absolute; inset:-6px; border-radius:50%; opacity:.5; }
.planet .contest{ position:absolute; inset:-11px; border-radius:50%; border:1px dashed var(--gold); opacity:.85; animation:spin 14s linear infinite; }
.planet .body{ position:absolute; inset:0; border-radius:50%; }
.planet .capmark{ position:absolute; inset:30%; border-radius:50%; border:1px solid rgba(255,255,255,.7); }
.planet .count{ position:absolute; bottom:-7px; right:-9px; min-width:16px; height:15px; padding:0 3px; display:grid; place-items:center;
  font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--ink); background:rgba(4,7,13,.92); }
.planet .pname{ position:absolute; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:10px;
  letter-spacing:.14em; text-transform:uppercase; color:var(--ink-dim); font-weight:500; pointer-events:none; }
.planet .hero{ position:absolute; top:-13px; left:50%; transform:translateX(-50%); width:18px; height:18px; display:grid; place-items:center;
  clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%); background:rgba(4,7,13,.85); font-size:9px; line-height:1; }
.planet .auras{ position:absolute; top:-12px; right:-13px; display:flex; gap:2px; font-size:10px; line-height:1;
  padding:1px 3px; background:rgba(4,7,13,.78); border:1px solid var(--line); border-radius:2px; pointer-events:none; }
.planet.selectable .ring{ animation:pulse 1.6s ease-in-out infinite; }
.planet.target .ring{ border-style:dashed; animation:pulse 1s ease-in-out infinite; }
.planet.src .ring{ opacity:1; }
/* §6.2 — at-rest threat & opportunity highlighting */
.planet .threat-halo{ position:absolute; inset:-13px; border-radius:50%; border:1.5px dashed var(--sith); box-shadow:0 0 12px rgba(255,52,71,.5); animation:pulse 1.4s ease-in-out infinite; pointer-events:none; }
.planet .opp-halo{ position:absolute; inset:-13px; border-radius:50%; border:1.5px dashed var(--gold); box-shadow:0 0 12px rgba(243,210,122,.45); animation:pulse 2.1s ease-in-out infinite; pointer-events:none; }
.planet .strat-badge{ position:absolute; bottom:-7px; left:-9px; min-width:15px; height:15px; padding:0 2px; display:grid; place-items:center;
  font-family:var(--font-mono); font-size:9px; font-weight:700; line-height:1; background:rgba(4,7,13,.92); }
/* §6.1 — one-time field guide overlay */
.onboard-wrap{ position:absolute; inset:0; z-index:60; display:grid; place-items:center; background:rgba(2,5,10,.72); backdrop-filter:blur(3px); animation:fadein .25s ease both; }
.onboard-panel{ width:min(760px,92vw); max-height:88vh; overflow:auto; padding:24px 28px; background:var(--panel-solid); }
.onboard-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.onboard-card{ border:1px solid var(--line); background:rgba(7,14,24,.55); padding:12px 14px; }
@keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }
@keyframes spin{ to{ transform:rotate(360deg);} }
@keyframes spinr{ to{ transform:rotate(-360deg);} }
@keyframes nexusPulse{ 0%,100%{ opacity:.55; transform:scale(.94);} 50%{ opacity:1; transform:scale(1.08);} }
/* §6.3 — combat-climax moment for duels / Thought Bomb */
@keyframes climaxIn{ 0%{ opacity:0; transform:scale(.7); } 55%{ opacity:1; transform:scale(1.06);} 100%{ opacity:1; transform:scale(1);} }
@keyframes shockwave{ 0%{ transform:scale(.2); opacity:.9;} 100%{ transform:scale(3.4); opacity:0;} }
@keyframes climaxFlash{ 0%{ opacity:0;} 18%{ opacity:1;} 100%{ opacity:0;} }
.climax-wrap{ position:absolute; inset:0; z-index:40; display:grid; place-items:center; pointer-events:none; }
.climax-flash{ position:absolute; inset:0; animation:climaxFlash 620ms ease-out forwards; }
.climax-card{ position:relative; text-align:center; animation:climaxIn 460ms cubic-bezier(.2,.8,.2,1) both; }
.climax-title{ font-family:var(--font-ui); font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  font-size:42px; line-height:1; text-shadow:0 0 24px currentColor; }
.climax-sub{ margin-top:10px; font-size:12px; letter-spacing:.34em; text-transform:uppercase; color:var(--ink-dim); }
.climax-ring{ position:absolute; left:50%; top:50%; width:160px; height:160px; margin:-80px 0 0 -80px;
  border-radius:50%; border:2px solid currentColor; animation:shockwave 900ms ease-out forwards; }
/* Force-nexus beacon — the strategic prize, drawn so the eye lands on it (TASK 3.2) */
.beacon-aura{ position:absolute; inset:-26px; border-radius:50%; pointer-events:none;
  background:radial-gradient(circle, rgba(243,210,122,.42), rgba(243,210,122,.12) 45%, transparent 70%);
  animation:nexusPulse 3.2s ease-in-out infinite; }
.beacon-ring{ position:absolute; inset:-14px; border-radius:50%; pointer-events:none; border:1px solid var(--gold);
  box-shadow:0 0 18px rgba(243,210,122,.7), inset 0 0 12px rgba(243,210,122,.4); animation:spin 22s linear infinite; }
.beacon-dash{ position:absolute; inset:-19px; border-radius:50%; pointer-events:none; border:1px dashed rgba(243,210,122,.55); animation:spinr 30s linear infinite; }
.beacon-glyph{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff7e0; text-shadow:0 0 6px var(--gold); pointer-events:none; line-height:1; }
.zonelabel{ position:absolute; top:3%; font-size:10px; letter-spacing:.3em; font-weight:600; opacity:.6; pointer-events:none; }

/* fleet pips (triangles, per design) */
.pips{ display:flex; flex-wrap:wrap; gap:5px; }
.pips .tri{ width:13px; height:13px; clip-path:polygon(50% 0,100% 100%,0 100%); }

/* dice */
.dice{ display:flex; gap:8px; }
.die{ width:46px; height:46px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
  padding:7px; position:relative; background:linear-gradient(150deg,rgba(95,220,255,.08),rgba(7,14,24,.92)); }
.die > div{ display:grid; place-items:center; }
.pip{ width:7px; height:7px; border-radius:50%; }
.die.win::after{ content:""; position:absolute; inset:-2px; border:1px solid var(--gold); }
.die.lose{ opacity:.45; }

.log{ font-family:var(--font-mono); font-size:11.5px; line-height:1.7; color:var(--ink-dim); }
.log b.j{ color:var(--jedi-glow);} .log b.s{ color:var(--sith-glow);} .log b.g{ color:var(--gold);} .log b.n{color:var(--neutral-glow);}

.hint{ font-size:12px; color:var(--gold); letter-spacing:.04em; min-height:16px; }
.fade-in{ animation:fadein .35s ease; }
@keyframes fadein{ from{ opacity:0;} to{ opacity:1;} }
.toast{ position:absolute; top:72px; left:50%; transform:translateX(-50%); z-index:50; padding:8px 18px;
  border:1px solid var(--line-strong); background:rgba(6,12,21,.95); font-size:13px; letter-spacing:.06em;
  animation:fadein .3s ease; pointer-events:none; }

/* select screen */
.selcrest{ width:60px; height:60px; position:relative; flex:none; }
.sidetab{ display:flex; align-items:center; gap:16px; padding:14px 24px; cursor:pointer; transition:.15s;
  background:rgba(7,14,24,.5); border:1px solid var(--line); opacity:.62; }
.sidetab.sel{ opacity:1; }
.sidetab.sel.jedi{ background:rgba(74,163,255,.1); border-color:var(--jedi); }
.sidetab.sel.sith{ background:rgba(255,52,71,.1); border-color:var(--sith); }
.champ{ text-align:left; cursor:pointer; padding:14px; position:relative; overflow:hidden; transition:.15s; }
.champ.sel.jedi{ border-color:var(--jedi); box-shadow:0 0 20px rgba(74,163,255,.3); background:linear-gradient(180deg,rgba(74,163,255,.16),rgba(7,14,24,.85)); }
.champ.sel.sith{ border-color:var(--sith); box-shadow:0 0 20px rgba(255,52,71,.3); background:linear-gradient(180deg,rgba(255,52,71,.16),rgba(7,14,24,.85)); }

/* force cards */
.fcard{ width:122px; height:144px; padding:12px; cursor:pointer; position:relative; text-align:left; transition:.16s;
  display:flex; flex-direction:column; border:1px solid var(--line);
  background:linear-gradient(170deg,rgba(18,32,52,.6),rgba(7,14,24,.92)); }
.fcard.aff{ border-color:var(--line-strong); }
.fcard.locked{ opacity:.5; }
.fcard.active.jedi{ border-color:var(--jedi); transform:translateY(-8px); box-shadow:0 0 26px rgba(74,163,255,.3); background:linear-gradient(170deg,rgba(74,163,255,.18),rgba(7,14,24,.95)); }
.fcard.active.sith{ border-color:var(--sith); transform:translateY(-8px); box-shadow:0 0 26px rgba(255,52,71,.3); background:linear-gradient(170deg,rgba(255,52,71,.18),rgba(7,14,24,.95)); }

/* ===================== §13 — RESPONSIVE / TABLET + PHONE (≤900px OR portrait) =====================
   Adopts the screens/tablet-board.jsx layout: condensed top bar → map → the side rails reflow into
   stacked bottom sheets over a full-width map. Desktop (>900px landscape) is byte-for-byte untouched —
   every rule below lives inside the media query. The map uses %-coordinate worlds, so it reflows with
   no data change. Two invariants for "no screen problems on a phone": (1) the page never scrolls
   sideways; (2) every full-viewport screen scrolls vertically instead of clipping tall content. */
@media (max-width:900px), (orientation:portrait){
  html, body{ overflow-x:hidden; max-width:100%; }   /* (1) — kill any horizontal scroll, definitively */
  body{ overflow-y:auto; }
  #app{ display:flex; flex-direction:column; width:100%; height:auto; min-height:100vh; min-height:100dvh; overflow-x:hidden; }
  /* (1b) THE universal guard — this layout was authored desktop-first with big fixed widths, centered
     `max-width:520-820px` reading columns, and 26-62px headings. On a phone those are what push the page
     wider than the screen (the "zoomed-in, pan sideways" symptom). Cap EVERYTHING to its container and let
     text wrap; combined with overflow-x:hidden the page can no longer scroll sideways on any screen. */
  #app *{ max-width:100% !important; }
  #app *, #app{ overflow-wrap:break-word; word-break:normal; }
  .starfield, .holo-grid{ position:fixed; inset:0; max-width:none !important; }   /* backgrounds cover the viewport, out of flow */
  /* (2) — every full-screen flex root (reinforce / force / combat / select / theater / victory / handoff)
     scrolls vertically inside the viewport instead of clipping; !important beats the Force screen's inline overflow:hidden */
  #app [style*="inset:0"]{ overflow-y:auto !important; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
  /* board chrome flows top→bottom; `order` puts the MAP directly under the top bar (tablet-board.jsx) */
  .topbar{ position:sticky; top:0; order:1; flex:none; height:auto; min-height:56px; flex-wrap:wrap; gap:8px; padding:8px 14px; }
  .center{ position:relative; order:2; inset:auto !important; width:100% !important; height:54vh; min-height:300px; flex:none; }
  /* !important + override BOTH .aside and .aside.right (base .aside.right is more specific: 0,2,0) so the rails truly go full-width and lose their desktop offsets */
  .aside, .aside.left, .aside.right{ position:relative; inset:auto !important; width:100% !important; max-height:none;
    border:none; border-top:1px solid var(--line); }
  .aside.left{ order:3; } .aside.right{ order:4; }
  .bottombar{ position:sticky; bottom:0; order:5; flex:none; height:auto; min-height:64px;
    flex-wrap:wrap; gap:10px; padding:10px 14px; }
  /* overlays track the viewport, not the (now tall, scrolling) #app */
  .onboard-wrap, .climax-wrap{ position:fixed; } .toast{ position:fixed; top:64px; }
  /* multi-column screens collapse a step (theater/draft 4→2; reinforce 1fr 380px → single) */
  .gridcols-4{ grid-template-columns:repeat(2,1fr) !important; }
  .gridcols-main{ grid-template-columns:1fr !important; }
  .onboard-grid{ grid-template-columns:1fr; }
  /* touch: buttons clear a 44px tap target (height only — width stays so rows never overflow). */
  .btn{ min-height:44px; }
  /* the combat screen's three fixed-width columns must shrink & wrap rather than overflow */
  .combat-cols{ flex-wrap:wrap; align-content:center; justify-content:center; padding:12px 14px !important; }
  .cwide{ width:auto !important; max-width:100%; min-width:0; }
  .combat-center{ width:auto !important; }
}
@media (max-width:560px){   /* phone fallback — one scrollable column */
  .center{ height:50vh; min-height:240px; }
  .gridcols-4{ grid-template-columns:1fr !important; }
  .phases{ display:none; }   /* the topbar phase tracker is redundant on the narrowest screens */
  .bottombar{ flex-direction:column; align-items:stretch; }
  .aside{ padding:13px 14px; }
  .planet .pname{ font-size:8px; letter-spacing:.06em; }   /* smaller world labels so edge worlds don't crowd a narrow map */
  .zonelabel{ font-size:8px; }
  /* keep any inline-padded screen header from pushing content off-canvas */
  .onboard-panel{ padding:18px 16px; }
  /* shrink the desktop headline type so a phone isn't "zoomed in" (these are inline font-sizes; !important wins) */
  [style*="font-size:62px"]{ font-size:30px !important; letter-spacing:.05em !important; }
  [style*="font-size:54px"]{ font-size:28px !important; }
  [style*="font-size:42px"], .climax-title{ font-size:24px !important; }
  [style*="font-size:34px"]{ font-size:23px !important; }
  [style*="font-size:33px"]{ font-size:22px !important; }
  [style*="font-size:32px"]{ font-size:22px !important; }
  [style*="font-size:26px"]{ font-size:19px !important; }
  [style*="font-size:24px"]{ font-size:18px !important; }
  [style*="font-size:23px"]{ font-size:18px !important; }
  /* tighten the heavy section paddings that waste a small screen */
  [style*="padding-top:30px"]{ padding-top:16px !important; }
  [style*="padding:26px 36px"], [style*="padding:26px 40px"]{ padding:14px 12px !important; }
  /* reinforce screen: let rows + the action footer wrap so the +/- steppers and Confirm button are never
     clipped off the right edge on a phone (the content is a touch wider than 390px in one line). */
  .rrow{ gap:8px !important; padding:11px 10px !important; flex-wrap:wrap; }
  .rrow .rstep{ margin-left:auto; }                 /* keep steppers right; drop to a 2nd line only if needed */
  [style*="padding:22px 30px 0"]{ padding:14px 12px 0 !important; }   /* the reinforce grid's side padding */
  .rfoot{ flex-wrap:wrap; }
  .rfoot > div, .rfoot > button{ flex:1 1 auto; }

// hero die bonus by role; fleet-round hero dice count (legends roll 3; Bane/scaling vary by instance)
function champBonus(kind, isAtk, ch){ const c=CHAMPIONS[kind]; if(!c) return 1;
  if(c.leanType==='commander') return 0;                              // Tarkin rolls no hero dice
  if(c.leanType==='scaling')   return Math.min(3, (ch&&ch.survived)||0); // Luke — +1 per battle survived (caps +3)
  if(c.leanType==='balanced')  return c.dieBonus;
  if(c.leanType==='offensive') return isAtk?c.dieBonus:1;
  return isAtk?1:c.dieBonus; }                                        // defensive
function heroDiceN(ch){ const c=CHAMPIONS[ch.kind]; if(c.leanType==='commander') return 0; return (c.heroDice||2)+(ch.bonusDice||0); }
// §15b — a flavor champion may declare `like:'<kind>'` to inherit a chassis's id-keyed abilities (e.g. Dooku→Kas'im, Grievous→Inquisitor).
function baseKind(ch){ const c=ch&&CHAMPIONS[ch.kind]; return (c&&c.like)||(ch&&ch.kind); }
function duelDiceN(ch){ const c=CHAMPIONS[ch.kind]; if(c.leanType==='commander') return 0; const b=baseKind(ch); return 3+(ch.bonusDice||0)+((b==='kasim'||b==='ventress')?1:0); }
function champRoleLabel(kind, isAtk){ const ch=CHAMPIONS[kind]; if(!ch) return '';
  if(ch.leanType==='commander') return 'Commander · no dice';
  if(ch.leanType==='scaling')   return 'Scaling · grows';
  if(ch.leanType==='balanced')  return 'Balanced';
  const inRole=(ch.leanType==='offensive')===isAtk;
  return inRole ? (ch.leanType==='offensive'?'In role · offensive':'In role · defensive') : 'Off-role'; }

// AI skill ("wiseness") — three tiers. Higher tiers mass a tighter spearhead, drive harder toward the
// enemy capital, pick fights more shrewdly, and wield the Force more. Faction STYLE is layered on top in
// aiParams(): the Sith press aggressively (riskier strikes), the Jedi are relentless (heavier
// concentration + capital focus). spear=fraction of the reinforcement pool funneled to the spearhead;
// base/cap=min capture odds to launch a normal/capital assault; push=weight on advancing toward the
// enemy capital; force=min eval value to spend a Force power; legend=will it rush its legendary unlock.
const AI_LEVELS = [
  { key:'padawan', name:'Padawan', blurb:'Still learning war — spreads thin and strikes only sure things.',            spear:0.45, base:0.60, cap:0.80, push:0.05, force:1.6,  legend:false },
  { key:'knight',  name:'Knight',  blurb:'A capable commander — masses a spearhead and presses it home.',              spear:0.70, base:0.50, cap:0.66, push:0.12, force:1.0,  legend:true  },
  { key:'master',  name:'Master',  blurb:'A grandmaster of war — concentrates force and drives for the throne.',       spear:0.88, base:0.43, cap:0.58, push:0.18, force:0.55, legend:true  },
];
function aiParams(side){ const L=AI_LEVELS[clamp((G&&G.aiLevel)|0,0,2)];
  const aggressive=(side==='sith'), relentless=(side==='jedi');
  return {
    spear:      clamp(L.spear + (relentless?0.06:0), 0, 0.95),    // Jedi mass even harder (relentless)
    baseThresh: clamp(L.base  - (aggressive?0.06:0), 0.30, 0.92), // Sith accept riskier assaults (aggressive)
    capThresh:  clamp(L.cap   - (aggressive?0.05:0), 0.40, 0.92), // …and strike the capital sooner
    push:       L.push + (relentless?0.04:0),                     // Jedi weight the march to the capital more
    forceMin:   L.force,
    legendEager:L.legend,
  };
}

function bfsDist(target){ const d={}; WORLDS.forEach(w=>d[w.id]=Infinity); if(target!=null) d[target]=0; const q=target!=null?[target]:[];
  while(q.length){ const u=q.shift(); for(const v of ADJ[u]) if(d[v]===Infinity){ d[v]=d[u]+1; q.push(v); } } return d; }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function d6(){ return 1+Math.floor(Math.random()*6); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

// Point THEATER at a map and rebind every derived global (§10a/§10b).
function loadTheater(id){
  THEATER = MAPS[id] || MAPS.galaxy;
  WORLDS=THEATER.worlds; LANES=THEATER.lanes; REGION_BONUS=THEATER.regionBonus||{};
  FAC=THEATER.fac; CHAMPIONS=THEATER.champions; DRAFT_POOL=THEATER.draftPool; LEGEND_OF=THEATER.legendOf;
  INF_CAP=THEATER.infCap||10;
  byId={}; WORLDS.forEach(w=>byId[w.id]=w);
  ADJ={}; WORLDS.forEach(w=>ADJ[w.id]=[]); LANES.forEach(([a,b])=>{ ADJ[a].push(b); ADJ[b].push(a); });
  DIST={ jedi:bfsDist(THEATER.caps.jedi), sith:bfsDist(THEATER.caps.sith) };   // hyperlane distance to each capital
  return THEATER;
}
function hasRule(r){ return !!(THEATER && THEATER.rules && THEATER.rules.includes(r)); }

let G=null, UI={}, aiTimer=null;

function newGame(humanSide, humanChamps, aiChamps, aiLevel){
  const worlds={};
  WORLDS.forEach(w=>{ worlds[w.id]={ id:w.id, owner:w.start, fleets:w.garrison, champion:null,
    barrier:null, valor:null, mindtrick:null, shield:null, dread:null, rage:null, illusion:null }; });
  if(hasRule('deathStar')) WORLDS.forEach(w=>{ if(w.ds){ worlds[w.id].ds=true; worlds[w.id].hull=DEATHSTAR_HULL; } });   // §10d — the Death Star's hull
  (THEATER.neutralGuards||[]).forEach(g=>{ if(worlds[g.world]) worlds[g.world].champion=mkChamp(g.kind,'neutral'); });

  const mk=(side)=>({ side, influence:3, deck:buildDeck(side), hand:[], discard:[],
    battlemed:false, foresight:false, legendUnlocked:false, fallenSith:0, champDieBuff:0 });
  G={ worlds, humanSide, aiSide:opp(humanSide), firstSide:humanSide,
    players:{ jedi:mk('jedi'), sith:mk('sith') },
    active:humanSide, phase:0, cycle:1, turnSeq:0, pool:0, reinforced:{}, maneuvered:{}, struck:{},
    combat:null, log:[], winner:null, over:false, aiLevel:clamp(typeof aiLevel==='number'?aiLevel:1,0,2),
    capOverride:null, baseRevealed:!hasRule('hiddenBase'), baseRelocated:false,   // §10d Hidden Base concealment
    deploySide:humanSide, deployQueue:humanChamps.slice() };   // the player positions their champions first
  mandaInit();                                                 // §16 — opt-in third faction (no-op unless the map declares the hook)
  autoPlaceChampions(G.aiSide, aiChamps);                      // the AI deploys its own
  drawToHand('jedi'); drawToHand('sith');
  UI={ screen:'deployheroes', sel:capitalOf(humanSide), src:null, moveN:1, targeting:null, forceSel:0, toast:null };
  logMsg(`<b class="g">Campaign begins.</b> ${THEATER.name} — ${THEATER.era}.`);
  render();   // start at the hero-deployment screen; startTurn fires once the player has positioned every champion
}

  UI={ screen:'deployheroes', sel:capitalOf(L), src:null, moveN:1, targeting:null, forceSel:0, toast:null };
  logMsg(`<b class="g">Hotseat campaign begins.</b> ${THEATER.name} — ${FAC[L].name} vs ${FAC[D].name}, two players, one device.`);
  render();
}
// §14.4 — the pass-the-device interstitial: a full-screen cover so the next player never sees the last one's screen.
function showHandoff(side, kind){ UI.screen='handoff'; UI.handoffSide=side; UI.handoffKind=kind;
  UI.src=null; UI.targeting=null; UI.showOnboard=false; UI.showLog=false;
  undoClear();   // §12b — the handoff is a player boundary: the next player must never inherit (or rewind into) the last one's undo history
  if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; } render(); }
// place a side's champions on its strongest held worlds (capital first) — used for the AI and for auto-deploy
function autoPlaceChampions(side, kinds){
  const cap=G.worlds[capitalOf(side)];
  const order=[]; if(cap && cap.owner===side) order.push(cap);
  worldsOf(side).filter(w=>w.id!==capitalOf(side)).sort((a,b)=>b.fleets-a.fleets).forEach(w=>order.push(w));
  kinds.forEach(kind=>{ const host=order.find(w=>!w.champion); if(host) host.champion=mkChamp(kind,side); });
}
function deployHeroAt(wid){ const W=G.worlds[wid], q=G.deployQueue; if(!q||!q.length) return;
  if(W.owner!==G.deploySide || W.champion){ UI.sel=wid; render(); return; }   // must be a held, championless world
  undoPush();   // §12b — reversible positioning step
  const kind=q.shift(); W.champion=mkChamp(kind, G.deploySide); UI.sel=wid;
  logMsg(`<b class="${G.deploySide[0]}">${FAC[G.deploySide].short}</b> station the <b class="g">${CHAMPIONS[kind].name}</b> on <b class="g">${byId[wid].name}</b>.`);
  if(!q.length) finishHeroDeploy(); else render();
}
function finishHeroDeploy(){ G.deployQueue=null;
  if(G.hotseat){
    const pend=G.hsPending&&Object.keys(G.hsPending);
    if(pend&&pend.length){ const nx=pend[0]; G.pendingDeployQueue=G.hsPending[nx]; delete G.hsPending[nx]; G.deploySide=nx;
      return showHandoff(nx,'deploy'); }                       // §14.2/14.4 — pass to the other player to deploy
    return showHandoff(G.firstSide,'turn1');                   // both deployed → pass back to Light for cycle 1
  }
  UI.screen='board'; UI.showOnboard=!onboardSeen(); startTurn(G.firstSide, true); }   // §6.1 — first board entry opens the field guide once
function mkChamp(kind,side){ return { kind, side, hp:CHAMPIONS[kind].hp, maxHp:CHAMPIONS[kind].hp, bonusDice:0 }; }
function logMsg(h){ G.log.unshift(h); if(G.log.length>RULES_EXT.LOG_RETAIN) G.log.pop(); }   // §12c — retain a full game's history
function P(s){ return G.players[s]; }
function worldsOf(s){ return WORLDS.map(w=>G.worlds[w.id]).filter(w=>w.owner===s); }
function livingChampions(s){ return WORLDS.map(w=>G.worlds[w.id]).filter(w=>w.champion&&w.champion.side===s); }
function hasChampionKind(s,k){ return livingChampions(s).some(w=>w.champion.kind===k); }
function championAt(id){ return G.worlds[id].champion; }

/* --------------------------- ECONOMY ------------------------------------- */
function reinforcePool(side){
  const owned=worldsOf(side);
  let pool;
  if(hasRule('smallBoard')){                            // §10c — tighter board: +1 fleet per 2 nodes, no region bonus
    pool=Math.max(2, Math.floor(owned.length/2));
  } else {
    pool=Math.max(3, Math.floor(owned.length/3));
    const byRegion={}; WORLDS.forEach(w=>{ (byRegion[w.region] ||= []).push(w.id); });
    for(const r in byRegion){ if(byRegion[r].every(id=>G.worlds[id].owner===side)) pool+=REGION_BONUS[r]||0; }
  }
  pool+=Math.min(2, Math.floor(P(side).influence/2));
  if(side===THEATER.light){                             // §3 light-side core-world passive (map-defined)
    (THEATER.corePassive||[]).forEach(id=>{ if(G.worlds[id] && G.worlds[id].owner===side) pool+=1; });
  }
  livingChampions(side).forEach(w=>{ const d=CHAMPIONS[w.champion.kind]; if(d&&d.reinforceBonus) pool+=d.reinforceBonus; });   // §15a — Rebel Command logistics (Leia/Cody) while she/he lives
  return pool;
}
function grantTurnStartInfluence(side){
  let gain=1;
  if(THEATER.nexusId && G.worlds[THEATER.nexusId] && G.worlds[THEATER.nexusId].owner===side) gain+=2;   // §6a — Force nexus
  if(side==='jedi'){
    const stable=livingChampions('jedi').some(w=>ADJ[w.id].every(n=>G.worlds[n].owner!=='sith'));
    if(stable) gain+=1;                                  // Jedi stability passive (§5)
  }
  const before=P(side).influence;
  P(side).influence=clamp(P(side).influence+gain,0,INF_CAP);
  return P(side).influence-before;
}

/* --------------------------- TURN FLOW ----------------------------------- */
function startTurn(side, first){
  G.active=side; G.phase=0; G.turnSeq++; undoClear();   // §12b — a fresh turn starts a fresh undo history
  if(G.hotseat){ G.humanSide=side; G.aiSide=opp(side); }   // §14.3 — POV trick: the active side IS "the human", so all perspective code just works
  G.reinforced={}; G.maneuvered={}; G.struck={}; UI.src=null; UI.targeting=null; UI.moveN=1; UI.moveChamp=false; UI.forceSel=0;
  // expire this player's timed DEFENSIVE auras — they shielded us through the enemy turn, now clear at our turn start.
  // NOTE: Sith Rage is offensive ("your next assault from a chosen world +1") and the Force phase is *after* Assault,
  // so it's always cast for next turn's assault — it must NOT be wiped here, or it could never be used. It persists
  // until consumed by an assault from that world (startAssault clears src.rage), like the battlemed/foresight flags.
  WORLDS.forEach(w=>{ const W=G.worlds[w.id];
    if(W.barrier && W.barrier.side===side) W.barrier=null;
    if(W.mindtrick && W.mindtrick.side===side) W.mindtrick=null;
    if(W.valor===side)    W.valor=null;
    if(W.shield===side)   W.shield=null;
    if(W.dread===side)    W.dread=null;
    if(W.illusion===side) W.illusion=null; });

  if(side===G.firstSide && G.cycle>MAX_CYCLES) return cycleTimeout();   // §6 safety valve only — no Ruusan-hold victory

  hiddenBaseTurnFx(side);   // §10d — reveal the base if the Empire borders it; relocate it once after first reveal
  const holdsNexus = THEATER.nexusId && G.worlds[THEATER.nexusId] && G.worlds[THEATER.nexusId].owner===side;
  if(!first){ const g=grantTurnStartInfluence(side); if(g>0) logMsg(`<b class="${side[0]}">${FAC[side].name}</b> gains ${g} ◈${holdsNexus?` (${THEATER.nexusName} nexus)`:''}.`); turnStartChampionFx(side); deathStarTurnFx(side); }
  if(hasRule('compactorHazard')){ WORLDS.forEach(w=>{ if(w.hazard){ const W=G.worlds[w.id]; if(W.owner===side && W.fleets>1){ W.fleets--; logMsg(`The <b class="g">${w.name}</b> grinds shut — ${FAC[side].short} lose a fleet.`); } } }); }   // §10e trash-compactor bleed
  if(G.over) return;
  G.pool=reinforcePool(side);
  if(side===G.humanSide && holdsNexus) toast(`You hold the ${THEATER.nexusName} nexus — +2 ◈/cycle`);
  syncScreen(); render();
  if(!G.hotseat && side===G.aiSide) scheduleAI();   // §14.1 — hotseat never runs the AI
}
function syncScreen(){
  if(G.over) return;
  if(UI.screen==='combat') return;
  if(G.active===G.aiSide){ UI.screen='board'; return; }
  UI.screen = G.phase===0 ? 'deploy' : G.phase===3 ? 'force' : 'board';
}
function advancePhase(){ G.phase++; UI.src=null; UI.targeting=null; UI.moveN=1; UI.moveChamp=false; UI.forceSel=0;
  undoClear(); sfx('phase');   // §12b/§12d — phase change is a commit point; clear undo and chime
  if(G.phase>3){ endTurn(); return; } syncScreen(); render(); }
function endTurn(){ drawToHand(G.active); const next=opp(G.active); if(next===G.firstSide) G.cycle++;
  if(G.active===THEATER.dark && hasRule('mandalore') && G.mandaRaids){ mandaTurn(); if(G.over) return; }   // §16 — Mandalore raids ride the end of the Dark turn (not in opp() rotation)
  if(G.hotseat) return showHandoff(next,'turn');   // §14.4 — cover the screen before the next human's turn
  startTurn(next,false); }
function endGame(w,why){ G.over=true; G.winner=w; UI.screen='victory'; UI.victoryWhy=why; if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; }
  clearSave(); sfx(w===G.humanSide?'capture':'defeat'); render(); }   // §12a/§12d — campaign over: discard the save, sound the result
function cycleTimeout(){
  const jw=worldsOf('jedi').length, sw=worldsOf('sith').length; let win;
  if(jw!==sw) win=jw>sw?'jedi':'sith';
  else { const jf=worldsOf('jedi').reduce((s,w)=>s+w.fleets,0), sf=worldsOf('sith').reduce((s,w)=>s+w.fleets,0);
    win=jf!==sf?(jf>sf?'jedi':'sith'):'sith'; }
  endGame(win,'outlasted the campaign clock, holding the larger galaxy');
}
function checkCapitalStrike(id){
  if(id===capitalOf(THEATER.dark))  return endGame(THEATER.light, `stormed ${byId[id].name}, the ${FAC[THEATER.dark].short} throneworld`);
  if(id===capitalOf(THEATER.light)) return endGame(THEATER.dark, `seized ${byId[id].name}, heart of the ${FAC[THEATER.light].short}`);
  return false;
}

/* --------------------------- REINFORCE ----------------------------------- */
function allocReinforce(wid,delta){
  const W=G.worlds[wid]; if(W.owner!==G.active) return;
  const cur=G.reinforced[wid]||0;
  if(delta>0 && G.pool<=0) return;
  if(delta<0 && cur<=0) return;
  undoPush();   // §12b — reversible positioning step
  G.reinforced[wid]=cur+delta; W.fleets+=delta; G.pool-=delta; render();
}
function autoDistribute(){
  const me=G.active;
  while(G.pool>0){
    const ts=(frontWorlds(me).length?frontWorlds(me):worldsOf(me)).sort((a,b)=>threat(b.id)-threat(a.id));
    const t=ts[0]||worldsOf(me)[0]; if(!t) break;
    t.fleets++; G.pool--; G.reinforced[t.id]=(G.reinforced[t.id]||0)+1;
  }
  render();
}

/* --------------------------- MANEUVER ------------------------------------- */
function canManeuverFrom(wid){ const W=G.worlds[wid];
  if(W.owner!==G.active || G.maneuvered[wid]) return false;
  const friendly = ADJ[wid].filter(n=>G.worlds[n].owner===G.active);
  if(!friendly.length) return false;
  if(W.fleets>1) return true;                                                          // fleets available to shift
  return !!(W.champion && W.champion.side===G.active && friendly.some(n=>!G.worlds[n].champion)); // …or a lone champion to relocate
}
function doManeuver(fromId,toId,n,moveChamp){
  const A=G.worlds[fromId], B=G.worlds[toId];
  const canChamp = !!(moveChamp && A.champion && A.champion.side===G.active && !B.champion); // one champion per world
  n=clamp(n, 0, Math.max(0, A.fleets-1));   // never strand the source below 1 fleet (a lone-champion world keeps its fleet)
  if(n<=0 && !canChamp) return;
  undoPush();   // §12b — reversible positioning step
  A.fleets-=n; B.fleets+=n;
  let msg;
  if(canChamp){ B.champion=A.champion; A.champion=null; const cn=CHAMPIONS[B.champion.kind].name;
    msg = n>0 ? `redeploys ${n} fleet(s) and the ${cn}` : `relocates the ${cn}`; }
  else msg = `redeploys ${n} fleet(s)`;
  G.maneuvered[fromId]=true;
  logMsg(`<b class="${G.active[0]}">${FAC[G.active].short}</b> ${msg}: ${byId[fromId].name} → ${byId[toId].name}.`);
  UI.src=null; UI.moveN=1; UI.moveChamp=false; render();
}

/* --------------------------- COMBAT -------------------------------------- */
function canAssaultFrom(wid){ const W=G.worlds[wid];
  if(W.owner!==G.active||W.fleets<2||G.struck[wid]) return false; return ADJ[wid].some(n=>isAssaultTarget(wid,n)); }
function isAssaultTarget(fromId,toId){ const T=G.worlds[toId];
  if(T.owner===G.active) return false;
  if(T.barrier) return false;
  if(T.mindtrick && T.mindtrick.vs===G.active) return false;
  if(hasRule('hiddenBase') && toId===capitalOf(THEATER.light) && !G.baseRevealed) return false;   // §10d — can't strike the concealed base
  return true; }
// Valor (Force aura) hard-stalls an assault at 2 fleets. Guardian (Bulwark) is now a unit, not a floor.
function defenderFloor(wid){ return !!G.worlds[wid].valor; }

/* -- champion-as-unit combat helpers (SPEC §4 + §7 lore abilities) -- */
// Darth Bane · Rule of Two — grows with every Sith champion that falls (a living Bane now, or inherited at unlock)
function scaleBane(fallenKind, fallenSide){ if(fallenSide!=='sith' || fallenKind==='bane') return;
  if(G.players&&G.players.sith) G.players.sith.fallenSith=(G.players.sith.fallenSith||0)+1;
  for(const w of WORLDS){ const W=G.worlds[w.id];
    if(W.champion && W.champion.kind==='bane'){ W.champion.bonusDice=(W.champion.bonusDice||0)+1; W.champion.maxHp++; W.champion.hp++;
      logMsg(`<b class="s">Rule of Two</b> — Darth Bane grows stronger (+1 hero die, +1 health).`); return; } } }
function bombChampion(W){ const ch=W.champion; if(!ch) return;
  if(ch.kind==='bane'){ logMsg(`<b class="s">Darth Bane</b> walks away from the blast — immune.`); return; }
  const k=ch.kind, s=ch.side; W.champion=null; scaleBane(k,s); }
// Lord Kaan · Thought Bomb — both armies contesting the world are annihilated
function triggerThoughtBomb(){ const c=G.combat; if(!c||c.thoughtBomb) return; c.thoughtBomb=true; c.ended=true;
  const src=G.worlds[c.fromId], tgt=G.worlds[c.toId];
  c.climax={ kind:'thoughtbomb' };   // §6.3 — the campaign's biggest detonation gets its own moment
  sfx('bomb');   // §12d
  logMsg(`<b class="s">☠ THOUGHT BOMB</b> — the blast consumes both armies contesting <b class="g">${byId[c.toId].name}</b>.`);
  tgt.fleets=0; bombChampion(tgt);
  src.fleets -= Math.min(3, Math.max(0, src.fleets-1));                 // the committed front line is gone; rear garrison remains
  if(src.champion && src.champion.side===c.atk) bombChampion(src); }
// General Hoth · Army of Light — rally a fleet from an adjacent friendly world into the battle
function armyOfLight(W){ const ch=W.champion; if(!ch) return;
  const donor=ADJ[W.id].map(n=>G.worlds[n]).find(x=>x.owner===ch.side && x.fleets>1);
  if(donor){ donor.fleets--; W.fleets++; logMsg(`<b class="j">Army of Light</b> — General Hoth rallies a fleet from ${byId[donor.id].name}.`); } }
// ---- Death Star era ability helpers (§10d/§10e) ----
function ambushImmune(ch){ return !!(ch && ch.kind==='kanan'); }                          // Sight Beyond Sight — no first-strike/ambush
function quigonAdjacent(side, worldId){ return !!(ADJ[worldId] && ADJ[worldId].some(n=>{ const W=G.worlds[n]; return W.champion && W.champion.side===side && W.champion.kind==='quigon'; })); }
// per-die buffs that ride on a champion's hero dice (duel + fleet): Obi-Wan's legacy, Palpatine's aura, Qui-Gon adjacency
function extraChampBonus(side, worldId){ const pl=P(side); let b=(pl&&pl.champDieBuff)||0;   // neutral guards have no player record
  if(side==='sith' && hasChampionKind('sith','palpatine')) b+=1;                           // Unlimited Power — all Imperial champions +1
  if(worldId!=null && quigonAdjacent(side, worldId)) b+=1;                                 // Unifying Force — adjacent ally +1
  return b; }
function chokeStrike(W, role, label){                                                     // Vader · Force Choke (and kin) — pre-combat
  if(W.fleets>0){ W.fleets--; logMsg(`<b class="s">${label}</b> crushes a fleet on ${byId[W.id].name}.`); return; }
  if(W.champion && !ambushImmune(W.champion)){ logMsg(`<b class="s">${label}</b> wounds the ${CHAMPIONS[W.champion.kind].name}.`); hurtChampion(W,1,role); } }
function creditScaling(){ const c=G.combat; if(!c) return;                                 // Luke · The Force Awakens — +1 per battle survived
  [G.worlds[c.fromId], G.worlds[c.toId]].forEach(W=>{ const ch=W&&W.champion; if(ch && CHAMPIONS[ch.kind] && CHAMPIONS[ch.kind].leanType==='scaling') ch.survived=(ch.survived||0)+1; }); }
// per-turn (per-cycle) non-combat effects: Palpatine's lightning + every Commander's station action (§15a generalizes Tarkin's)
function turnStartChampionFx(side){
  if(hasChampionKind(side,'palpatine')){                                                   // Unlimited Power — lightning on a contested world
    const t=adjacentEnemy(side).filter(w=>w.fleets>1).sort((a,b)=>b.fleets-a.fleets)[0];
    if(t){ t.fleets--; logMsg(`<b class="s">Unlimited Power</b> — Palpatine’s lightning costs ${byId[t.id].name} a fleet.`); } }
  commanderTurnFx(side);
}
// §15a — the Commander chassis station action, driven by each def's `command` ('strip' = Tarkin/Tactical Droid; 'rally' = Leia/Cody).
function commanderTurnFx(side){
  const tag=side[0];
  for(const w of livingChampions(side)){
    const def=CHAMPIONS[w.champion.kind]; if(!def || def.leanType!=='commander') continue;
    const label=def.cmdLabel||def.ability, name=def.name;
    if(def.command==='strip'){                                                              // strip a fleet from the strongest enemy bordering the capital
      const ring=ADJ[capitalOf(side)]||[];
      const t=ring.map(n=>G.worlds[n]).filter(x=>x.owner===opp(side)&&x.fleets>1).sort((a,b)=>b.fleets-a.fleets)[0];
      if(t){ t.fleets--; logMsg(`<b class="${tag}">${label}</b> — the ${name} strips a fleet from ${byId[t.id].name}.`); }
    } else if(def.command==='rally'){                                                       // §15a — reveal one adjacent enemy world + reinforce the weakest friendly FRONT world she borders
      const adjE=ADJ[w.id].map(n=>G.worlds[n]).filter(x=>x.owner===opp(side)).sort((a,b)=>b.fleets-a.fleets)[0];
      if(adjE){ const cn=champLabel(adjE.champion); logMsg(`<b class="${tag}">${label}</b> — the ${name} reveals ${byId[adjE.id].name}: ${adjE.fleets} fleet(s)${cn?`, the ${cn}`:''}.`); }
      const fronts=ADJ[w.id].map(n=>G.worlds[n]).filter(x=>x.owner===side && ADJ[x.id].some(m=>G.worlds[m].owner===opp(side)));
      const pick=fronts.sort((a,b)=>a.fleets-b.fleets)[0];                                  // no bordering front → no fleet (spec-exact; her command only feeds the front)
      if(pick){ pick.fleets+=RULES_EXT.LEIA_COMMAND_FLEET; logMsg(`<b class="${tag}">${label}</b> — the ${name} rushes +${RULES_EXT.LEIA_COMMAND_FLEET} fleet to ${byId[pick.id].name}.`); }
    }
  }
}
// §10d — the Death Star's superlaser: each Imperial turn it bombards the strongest contested world bordering Imperial space.
function deathStarTurnFx(side){
  if(!hasRule('deathStar') || side!==THEATER.dark) return;
  const dsId=capitalOf(THEATER.dark), ds=G.worlds[dsId]; if(!ds || ds.owner!==side) return;
  const ring=new Set(); worldsOf(side).forEach(w=>ADJ[w.id].forEach(n=>{ if(G.worlds[n].owner!==side) ring.add(n); }));
  const t=[...ring].map(id=>G.worlds[id]).filter(w=>w.fleets>1 && byId[w.id].id!==capitalOf(THEATER.light)).sort((a,b)=>b.fleets-a.fleets)[0];
  if(t){ t.fleets--; const gain=(t.owner===opp(side));
    if(gain) P(side).influence=clamp(P(side).influence+2,0,INF_CAP);
    logMsg(`<b class="s">▣ SUPERLASER</b> — the Death Star scorches ${byId[t.id].name}, costing it a fleet${gain?' (+2 ◈)':''}.`); }
}
// §10d — Hidden Base: reveal when the Empire borders it; the first time it is revealed it relocates once (next Rebel turn).
function hiddenBaseTurnFx(side){
  if(!hasRule('hiddenBase')) return;
  const baseId=capitalOf(THEATER.light), base=G.worlds[baseId];
  if(!base) return;
  if(!G.baseRevealed){
    const found=ADJ[baseId] && ADJ[baseId].some(n=>G.worlds[n].owner===THEATER.dark);
    if(found){ G.baseRevealed=true; logMsg(`<b class="s">The Hidden Base is found</b> — the Empire closes on ${base.id===baseId?byId[baseId].name:baseId}.`); }
  }
  // relocate once, at the Rebels' own turn start, after it has been revealed
  if(side===THEATER.light && G.baseRevealed && !G.baseRelocated){
    const dist=bfsDist(capitalOf(THEATER.dark));
    const dest=worldsOf(THEATER.light).filter(w=>w.id!==baseId).sort((a,b)=>(dist[b.id]||0)-(dist[a.id]||0))[0];
    if(dest){ G.capOverride={ ...(G.capOverride||{}), [THEATER.light]:dest.id }; G.baseRelocated=true; G.baseRevealed=false;
      logMsg(`<b class="j">The Rebels slip away</b> — the Hidden Base relocates to ${byId[dest.id].name} and vanishes from Imperial scopes.`); }
    else G.baseRelocated=true;
  }
}
/* ====================== §16 — MANDALORE (opt-in third faction) ============ */
// Contained raider: it reinforces a tiny pool and runs a couple of headless assaults on bordering, non-capital
// worlds it can clearly win. It never attacks a faction capital, never channels Force / holds influence / wins.
function mandaInit(){ if(!G) return;
  G.mandaRaids = hasRule('mandalore') ? (UI.mandaRaids!==false) : false;   // default On when the map declares the hook
  if(hasRule('mandalore') && !G.players.manda)
    G.players.manda={ side:'manda', influence:0, deck:[], hand:[], discard:[], battlemed:false, foresight:false, legendUnlocked:true, fallenSith:0, champDieBuff:0 }; }
function isFactionCapital(id){ return capitalSideOf(id)!==null; }          // a light/dark throneworld — Mandalore never strikes these
function mandaParams(){ const lvl=clamp((G&&G.aiLevel)|0,0,2);             // scale aggression with the chosen AI tier
  return { raids: lvl===0?1:RULES_EXT.MANDALORE.raidsPerTurn,              // Padawan → 1 safe raid; Knight/Master → up to 2
           threshold: lvl===2?RULES_EXT.MANDALORE.raidThreshold:(lvl===1?0.70:0.78) }; }   // Master strikes at the 0.65 floor; lower tiers play safer
function mandaTurn(){
  if(!hasRule('mandalore') || !G.mandaRaids || G.over) return;
  const me='manda', owned=worldsOf(me); if(!owned.length) return;
  const prevActive=G.active, par=mandaParams(), M=RULES_EXT.MANDALORE;
  const fronts=owned.filter(w=>ADJ[w.id].some(n=>G.worlds[n].owner!==me));
  // (a) reinforce — a tiny pool massed on the front nearest a non-Mandalore world
  const pool=Math.max(M.reinforceMin, Math.floor(owned.length/M.reinforceDiv));
  const mass=(fronts.length?fronts:owned).slice().sort((a,b)=>b.fleets-a.fleets)[0];
  if(mass && pool>0){ mass.fleets+=pool; logMsg(`<b class="n">Mandalore</b> masses ${pool} fleet(s) on ${byId[mass.id].name}.`); }
  // (b) raids — up to N adjacent, non-capital targets it can clearly win (headless capture odds ≥ threshold)
  let raids=0;
  for(const w of (fronts.length?fronts:owned).slice().sort((a,b)=>b.fleets-a.fleets)){
    if(raids>=par.raids || G.over) break;
    if(w.fleets<2) continue;
    let best=null, bestP=0;
    for(const n of ADJ[w.id]){ const t=G.worlds[n];
      if(t.owner===me || isFactionCapital(n) || !canStrike(w.id,n,me)) continue;
      const f=assaultForecast(w.id,n); if(f.pct>bestP){ bestP=f.pct; best=n; } }
    if(best && bestP>=par.threshold){ mandaRaid(w.id,best); raids++; }
  }
  G.active=prevActive;
}
// resolve a Mandalore assault headlessly with the real engine — no combat screen.
function mandaRaid(fromId,toId){
  G.active='manda';
  startAssault(fromId,toId);
  let guard=0;
  while(G.combat && !G.combat.captured && !G.combat.ended && !G.over && guard++<400) combatRoundStep();
  if(G.over) return;
  if(G.combat){
    if(G.combat.captured){ G.combat.moveN=G.combat.moveMax; confirmCapture(); }   // push the whole raiding party in
    else { creditScaling(); G.combat=null; UI.screen='board'; }                   // beaten back — break off
  }
}

// unified champion damage; returns 1 if the champion left the battle world, else 0. role: 'atk' | 'def'
function hurtChampion(W, hits, role){ const ch=W.champion; if(!ch||hits<=0) return 0;
  ch.hp-=hits; if(ch.hp>0) return 0;
  if(ch.kind==='othone' && !ch.lastWitness){ ch.lastWitness=true; ch.hp=1;                 // Last Witness — survive once
    logMsg(`<b class="j">Last Witness</b> — Johun Othone clings to life at 1 health, and the enemy is laid bare.`); return 0; }
  if(ch.kind==='kopecz'){                                                                  // Survivor's Frenzy — always slips away
    if(role==='atk'){ ch.hp=1; if(G.combat) G.combat.ended=true; logMsg(`<b class="s">Survivor’s Frenzy</b> — Kopecz slips away alive; the assault breaks off.`); return 0; }
    const flee=ADJ[W.id].find(n=>G.worlds[n].owner===ch.side && !G.worlds[n].champion);
    if(flee){ ch.hp=1; G.worlds[flee].champion=ch; W.champion=null; logMsg(`<b class="s">Survivor’s Frenzy</b> — Kopecz escapes to ${byId[flee].name}.`); return 1; } }
  if(ch.kind==='obiwan'){ P(ch.side).champDieBuff=(P(ch.side).champDieBuff||0)+1;          // One With the Force — death legacy (+1 to all allies)
    logMsg(`<b class="j">One With the Force</b> — Obi-Wan becomes more powerful; every allied champion gains +1.`); }
  const k=ch.kind, s=ch.side; W.champion=null; logMsg(`The <b>${CHAMPIONS[k].name}</b> falls.`);
  if(k==='kaan') triggerThoughtBomb();                                                     // Thought Bomb on death
  scaleBane(k,s);

function hurtChampionAt(W, hits){ const c=G.combat; const role=(c && W===G.worlds[c.fromId])?'atk':'def'; return hurtChampion(W,hits,role); }
function defFleetFloor(tgt){ const c=G.combat; let f=0;
  if(c.valorFloor) f=Math.max(f,2);                                          // Valor aura
  if(tgt.champion && (tgt.champion.kind==='charny'||tgt.champion.kind==='kanan')) f=Math.max(f,1);   // Hold the Line / Sight Beyond Sight — world holds ≥1
  return f; }
function applyAttackerCasualties(src, hits){ const c=G.combat; let fl=0, ch=0;
  const rem=Math.min(hits, Math.max(0, src.fleets-1)); src.fleets-=rem; hits-=rem; fl=rem;   // 1 fleet always garrisons the source
  if(hits>0 && src.champion && src.champion.side===c.atk) ch=hurtChampion(src,hits,'atk');
  return { fl, ch, units:fl+ch, text:`${fl} fleet(s)${ch?' + champion':''}` }; }
function applyDefenderCasualties(tgt, hits){ const c=G.combat; let fl=0, ch=0;
  const rem=Math.min(hits, Math.max(0, tgt.fleets-defFleetFloor(tgt))); tgt.fleets-=rem; hits-=rem; fl=rem;
  if(hits>0 && tgt.champion && (tgt.fleets===0 || tgt.champion.kind==='charny' || tgt.champion.kind==='kanan')) ch=hurtChampion(tgt,hits,'def');
  return { fl, ch, units:fl+ch, text:`${fl} fleet(s)${ch?' + champion':''}` }; }
function resolveDuel(){ const c=G.combat; const src=G.worlds[c.fromId], tgt=G.worlds[c.toId];
  const aCh=src.champion, dCh=tgt.champion; if(!aCh||!dCh) return;
  sfx('duel');   // §12d — the duel-clash blip lives in the logic fn, surviving re-renders
  let a=Array.from({length:duelDiceN(aCh)},d6), d=Array.from({length:duelDiceN(dCh)},d6);
  const frz=k=>(k==='kopecz'||k==='fifthbrother');
  if(frz(aCh.kind)) a=a.map(v=>v===1?d6():v);                                // Frenzy / Brutal Pursuit re-roll 1s
  if(frz(dCh.kind)) d=d.map(v=>v===1?d6():v);
  // Grandmaster — Yoda lifts every allied duel by +1 while he lives (galaxy/room-wide)
  const aDuelAura=(hasChampionKind(aCh.side,'yoda')?1:0), dDuelAura=(hasChampionKind(dCh.side,'yoda')?1:0);
  const aBest=Math.max(...a.map(v=>v+c.aBonus+c.aMod+aDuelAura));
  const dBest=Math.max(...d.map(v=>v+c.dBonus+c.dMod+dDuelAura));
  c.duelDice={ a:a.slice(), d:d.slice() };
  let win = aBest>dBest?'a':dBest>aBest?'d':'tie';
  if(win==='tie'){ if(aCh.kind==='farfalla') win='a'; else if(dCh.kind==='farfalla') win='d'; }   // Golden Blade wins ties
  if(aCh.kind==='yoda') win='a'; else if(dCh.kind==='yoda') win='d';         // Grandmaster — wins every duel
  const flairOf=ch=>baseKind(ch)==='yoda'?'Grandmaster':(baseKind(ch)==='kasim'?'Double Strike':null);   // §6.3 climax flair

    logMsg(`Duel — <b class="${c.atk[0]}">${CHAMPIONS[aCh.kind].name}</b> bests the ${CHAMPIONS[dCh.kind].name}${dmg>1?' — a double strike':''}.`);

  else if(win==='d'){ c.heroWin='d'; const dmg=baseKind(dCh)==='kasim'?2:1;

    logMsg(`Duel — <b class="${(c.def==='jedi'||c.def==='sith')?c.def[0]:'n'}">${CHAMPIONS[dCh.kind].name}</b> bests the ${CHAMPIONS[aCh.kind].name}${dmg>1?' — a double strike':''}.`);
    hurtChampionAt(src,dmg); }
  else { c.heroWin=null; logMsg(`Duel — blades lock; neither hero yields.`); } }

function startAssault(fromId,toId){
  undoClear();   // §12b — launching an assault commits the dice; nothing before it is reversible now
  const atk=G.active, def=G.worlds[toId].owner, pl=P(atk);
  const src=G.worlds[fromId], tgt=G.worlds[toId];
  let aMod=0, dMod=0; const mods=[];
  // Force-power / aura flat dice modifiers (apply to fleet AND hero dice)
  if(pl.battlemed){ aMod+=1; dMod-=1; mods.push('Battle Meditation · +1 atk / −1 def'); pl.battlemed=false; }
  if(src.rage===atk){ aMod+=1; mods.push('Sith Rage · +1 atk'); src.rage=null; }
  if(tgt.shield===def){ dMod+=1; mods.push('Force Shield · +1 def'); }
  if(tgt.dread===def){ aMod-=1; mods.push('Dread · −1 atk'); }
  let firstStrike=false;
  if(pl.foresight){ firstStrike=true; mods.push('Foresight · +1 first round'); pl.foresight=false; }
  // Nomi Sunrider · Battle Meditation — galaxy-wide while she lives
  if(hasChampionKind('jedi','nomi')){ if(atk==='jedi') aMod+=1; else dMod+=1; mods.push('Battle Meditation (Nomi) · Republic +1'); }

  const aCh=(src.champion && src.champion.side===atk)?src.champion:null;
  const dCh=tgt.champion||null;
  const aKind=aCh?aCh.kind:null, dKind=dCh?dCh.kind:null;
  if(aKind==='nomi') dMod-=1;                          // enemy defends −1 against Nomi
  if(dKind==='nomi') aMod-=1;
  const nexus=(toId===THEATER.nexusId)?1:0;            // §6a — champions fighting on the Force nexus roll +1
  if(nexus) mods.push(`${THEATER.nexusName} nexus · champions +1`);
  if(aKind) mods.push(`${CHAMPIONS[aKind].name} · ${CHAMPIONS[aKind].ability}`);
  if(dKind) mods.push(`${CHAMPIONS[dKind].name} · ${CHAMPIONS[dKind].ability}`);

  G.combat={ fromId,toId,atk,def, aMod,dMod, firstStrike,
    aKind,dKind, aBonus:(aKind?champBonus(aKind,true,aCh)+extraChampBonus(atk,fromId):0)+nexus,
    dBonus:(dKind?champBonus(dKind,false,dCh)+extraChampBonus(def,toId):0)+nexus,
    valorFloor:!!tgt.valor,
    round:0, step:'pre', captured:false, ended:false, stalled:false, heroWin:null, duelPending:false, thoughtBomb:false, climax:null,
    goldenA:false, goldenD:false, poisonAtk:false, poisonDef:false,
    duelDice:null, aFleetDice:[], aHeroDice:[], dFleetDice:[], dHeroDice:[],
    atkStartFleets:src.fleets, defStartFleets:tgt.fleets, modsText:'' };
  const c=G.combat;

  UI.screen='combat';
  logMsg(`<b class="${atk[0]}">${FAC[atk].short}</b> assaults <b class="g">${tgt.name}</b> from ${src.name}.`);

  // ----- pre-combat champion abilities -----
  if(aKind==='hoth') armyOfLight(src);                 // Army of Light — rally a fleet
  if(dKind==='hoth') armyOfLight(tgt);
  if(aKind==='githany' && dCh){ c.poisonDef=true; logMsg(`<b class="s">Venom &amp; Treachery</b> — Githany poisons the ${CHAMPIONS[dKind].name}.`); }
  if(dKind==='githany' && aCh){ c.poisonAtk=true; logMsg(`<b class="s">Venom &amp; Treachery</b> — Githany poisons the ${CHAMPIONS[aKind].name}.`); }
  if(aKind==='vader') chokeStrike(tgt,'def','Force Choke');           // Vader · Force Choke — kill a fleet, else wound the champion
  if(dKind==='vader') chokeStrike(src,'atk','Force Choke');
  if(aKind==='ventress' && dCh && !ambushImmune(dCh)){ logMsg(`<b class="s">Twin Blades</b> — Ventress draws first blood on the ${CHAMPIONS[dKind].name}.`); hurtChampion(tgt,1,'def'); }   // assassin's reach
  if((aKind==='ahsoka'||aKind==='quigon') && dCh) logMsg(`<b class="j">${CHAMPIONS[aKind].ability}</b> lays bare the ${CHAMPIONS[dKind].name} (${tgt.fleets} fleet(s)).`);   // Fulcrum / Unifying — intel
  if(aKind==='secondsister'){ const e=opp(atk); if(P(e).influence>0){ P(e).influence--; const b=P(atk).influence; P(atk).influence=clamp(P(atk).influence+1,0,INF_CAP); logMsg(`<b class="s">Interrogation</b> — Second Sister drains 1 ◈ from the ${FAC[e].short}.`); } }

  c.duelPending = !!(src.champion && tgt.champion && duelDiceN(src.champion)>0 && duelDiceN(tgt.champion)>0);
  c.modsText=mods.join(' · ');

  if(tgt.fleets<=0 && !tgt.champion) captureWorld();   // pre-combat already cleared it (capture, don't bail early)
  render();
