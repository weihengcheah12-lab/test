}
function combatRoundStep(){
  const c=G.combat; if(!c||c.ended||c.captured) return;
  const src=G.worlds[c.fromId], tgt=G.worlds[c.toId];
  c.heroWin=null; c.climax=null;   // §6.3 — a fresh step clears the previous climax callout

  // ---- §4d champion duel: heroes cross blades before any fleet clashes ----
  if(c.duelPending){ c.duelPending=false; c.step='duel'; c.aFleetDice=[]; c.dFleetDice=[]; c.aHeroDice=[]; c.dHeroDice=[];
    resolveDuel();
    if(c.ended) return;                                          // a duel death may have detonated a Thought Bomb
    if(tgt.fleets<=0 && !tgt.champion) return captureWorld();
    return; }

  // ---- §4b fleet round (fleet dice + hero dice in one pool) ----
  c.step='fleet'; c.round++; sfx('dice');   // §12d
  let aCh=(src.champion && src.champion.side===c.atk)?src.champion:null;
  let dCh=tgt.champion||null;

  // Githany · Venom — the poisoned enemy champion loses 1 health at the start of each round
  if(c.poisonDef && tgt.champion){ logMsg(`<b class="s">Venom</b> withers the ${CHAMPIONS[tgt.champion.kind].name} (−1 health).`); hurtChampion(tgt,1,'def'); dCh=tgt.champion||null; }
  if(c.poisonAtk && src.champion && src.champion.side===c.atk){ logMsg(`<b class="s">Venom</b> withers the ${CHAMPIONS[src.champion.kind].name} (−1 health).`); hurtChampion(src,1,'atk'); aCh=(src.champion&&src.champion.side===c.atk)?src.champion:null; }
  if(c.ended) return;                                            // venom could detonate Kaan
  if(tgt.fleets<=0 && !tgt.champion) return captureWorld();

  const aHunt=(aCh&&baseKind(aCh)==='inquisitor'&&dCh)?2:0, dHunt=(dCh&&baseKind(dCh)==='inquisitor'&&aCh)?2:0;   // Jedi Hunter — +2 dice vs a champion
  const aFleetN=Math.min(3, src.fleets-1), aHeroN=(aCh?heroDiceN(aCh):0)+aHunt;
  const dFleetN=Math.min(2, tgt.fleets),   dHeroN=(dCh?heroDiceN(dCh):0)+dHunt;
  if(aFleetN+aHeroN < 2){ c.ended=true; return; }                // §4b: attacker can no longer field 2 combat dice

  let aFleet=Array.from({length:aFleetN},d6), aHero=Array.from({length:aHeroN},d6);
  let dFleet=Array.from({length:dFleetN},d6), dHero=Array.from({length:dHeroN},d6);
  const frenzy=k=>(k==='kopecz'||k==='fifthbrother');   // Survivor's Frenzy / Brutal Pursuit — re-roll natural 1s
  if(aCh&&frenzy(aCh.kind)){ aFleet=aFleet.map(v=>v===1?d6():v); aHero=aHero.map(v=>v===1?d6():v); }
  if(dCh&&frenzy(dCh.kind)){ dFleet=dFleet.map(v=>v===1?d6():v); dHero=dHero.map(v=>v===1?d6():v); }
  if(aCh&&aCh.kind==='hoth'){ const i=aFleet.indexOf(1); if(i>=0) aFleet[i]=d6(); }                       // Army of Light — re-roll a single fleet 1
  if(dCh&&dCh.kind==='hoth'){ const i=dFleet.indexOf(1); if(i>=0) dFleet[i]=d6(); }
  c.aFleetDice=aFleet.slice(); c.aHeroDice=aHero.slice(); c.dFleetDice=dFleet.slice(); c.dHeroDice=dHero.slice();

  const fb=(c.round===1 && c.firstStrike)?1:0;
  let aVals=aFleet.map(v=>v+c.aMod+fb).concat(aHero.map(v=>v+c.aMod+fb+c.aBonus));
  let dVals=dFleet.map(v=>v+c.dMod).concat(dHero.map(v=>v+c.dMod+c.dBonus));
  if(aCh&&aCh.kind==='farfalla'&&!c.goldenA){ c.goldenA=true; aVals=aVals.concat([d6(),d6()].map(v=>v+c.aMod+c.aBonus)); logMsg(`<b class="j">Golden Reinforcement</b> — Farfalla’s fleet joins the fray (+2 dice).`); }
  if(dCh&&dCh.kind==='farfalla'&&!c.goldenD){ c.goldenD=true; dVals=dVals.concat([d6(),d6()].map(v=>v+c.dMod+c.dBonus)); logMsg(`<b class="j">Golden Reinforcement</b> — Farfalla’s fleet joins the fray (+2 dice).`); }
  aVals.sort((x,y)=>y-x); dVals.sort((x,y)=>y-x);
  const pairs=Math.min(aVals.length,dVals.length); let aWins=0,dWins=0;
  for(let i=0;i<pairs;i++){ if(aVals[i]>dVals[i]) aWins++; else dWins++; }  // defender wins ties

  let atkHits=dWins, defHits=aWins;
  // an undefended position (e.g. a lone commander with no fleets and no combat dice) can't oppose the assault — it is overrun
  if(dFleetN+dHeroN===0 && aFleetN+aHeroN>0) defHits=Math.max(defHits, aVals.length);
  if(aCh&&frenzy(aCh.kind)&&aWins>0) defHits++;   // Frenzy / Brutal Pursuit — +1 casualty on a winning round
  if(dCh&&frenzy(dCh.kind)&&dWins>0) atkHits++;
  if(aCh&&baseKind(aCh)==='inquisitor'&&dCh&&aWins>0) defHits++;   // Jedi Hunter — +1 casualty when fighting a champion
  if(dCh&&baseKind(dCh)==='inquisitor'&&aCh&&dWins>0) atkHits++;

  const aL=applyAttackerCasualties(src, atkHits);
  if(tgt.ds){
    // §10d — the Death Star's turbolaser batteries are fixed; ONLY a champion's winning round scars the hull (the exhaust port).
    let hullText;
    if(aCh && defHits>0 && tgt.hull>0){ tgt.hull--; hullText=`HULL −1 (${tgt.hull} left)`; }
    else hullText = aCh ? `the hull holds` : `no champion — the hull is untouched`;
    logMsg(`Round ${c.round} — ${FAC[c.atk].short} −${aL.text} · Death Star ${hullText}.`);
    if(tgt.hull<=0){ c.ended=true; logMsg(`<b class="j">▣ THE DEATH STAR IS DESTROYED.</b>`);
      return endGame(THEATER.light, `blew the Death Star apart — the Empire's terror weapon is ash`); }
  } else {
    const dL=applyDefenderCasualties(tgt, defHits);
    logMsg(`Round ${c.round} — ${FAC[c.atk].short} −${aL.text} · ${byId[c.toId].name} −${dL.text}.`);
  }

  if(c.ended) return;                                            // a fall may have detonated a Thought Bomb
  if(!tgt.ds && tgt.fleets<=0 && !tgt.champion) return captureWorld();
  const aChAlive=src.champion && src.champion.side===c.atk;
  if(Math.min(3,src.fleets-1) + (aChAlive?heroDiceN(src.champion):0) < 2){ c.ended=true; return; }
  // hard stall: Valor holds fleets at 2 and the champion (if any) is unreachable behind them
  c.stalled = c.valorFloor && tgt.fleets<=2 && !(tgt.champion && tgt.champion.kind==='charny');
}
function captureWorld(){
  const c=G.combat; const src=G.worlds[c.fromId];
  c.captured=true; c.step='fleet';
  c.advancing = !!(src.champion && src.champion.side===c.atk);         // §4e — surviving attacking champion advances
  // the player now chooses how much of the assault force pushes in (§4e). 1 fleet always garrisons the source;
  // the captured world must hold ≥1 fleet UNLESS a surviving champion stays to hold it.
  c.moveMax = Math.max(0, src.fleets-1);
  c.moveMin = c.advancing ? 0 : Math.min(1, c.moveMax);
  c.moveN   = c.moveMax;                                               // default: commit the whole front line (momentum forward)
  render();   // the capture-confirmation step now offers a fleet chooser before the world changes hands
}
function confirmCapture(){
  const c=G.combat, capturedId=c.toId;
  const src=G.worlds[c.fromId], tgt=G.worlds[c.toId];
  let move=clamp(c.moveN, c.moveMin, c.moveMax);
  if(!c.advancing && move<1) move=Math.min(1, c.moveMax);             // a world with no champion needs a fleet to hold it
  tgt.fleets=move; src.fleets-=move; tgt.owner=c.atk; tgt.valor=null; tgt.rage=null;   // the conquered world sheds the old owner's auras
  G.struck[tgt.id]=true;   // a freshly-taken world can't launch another assault this turn (no one-turn map-wide blitz)
  let champNote='';
  if(c.advancing){ tgt.champion=src.champion; src.champion=null; champNote=` and the ${CHAMPIONS[tgt.champion.kind].name}`; }
  else tgt.champion=null;
  logMsg(`<b class="${c.atk[0]}">${FAC[c.atk].short}</b> captures <b class="g">${tgt.name}</b> — ${move} fleet(s)${champNote} move in.`);
  if(c.atk==='sith'){ const b=P('sith').influence; P('sith').influence=clamp(P('sith').influence+1,0,INF_CAP);   // dark-side conquest economy
    if(P('sith').influence>b) logMsg(`<b class="s">${FAC['sith'].short}</b> draw +1 ◈ from the conquest.`); }
  creditScaling();   // Luke etc — credit the survived battle
  undoClear(); sfx('capture');   // §12b/§12d — a capture is irreversible
  G.combat=null; UI.screen='board'; UI.src=null;
  if(checkCapitalStrike(capturedId)) return;
  render();
}
function retreatAssault(){ const c=G.combat; if(!c) return; c.ended=true;
  logMsg(`<b class="${c.atk[0]}">${FAC[c.atk].short}</b> breaks off the assault on ${G.worlds[c.toId].name}.`);
  creditScaling(); G.combat=null; UI.screen='board'; UI.src=null; render(); }

/* --------------------------- FORECAST (odds engine) ---------------------- */
// Exact per-die probability map after a flat modifier and optional re-roll of natural 1s (Marauder Frenzy).
function dieProbs(mod, reroll1){
  const base={}; for(let v=1;v<=6;v++) base[v]=1/6;
  if(reroll1){ const one=base[1]; base[1]=one*one; for(let v=2;v<=6;v++) base[v]=(1/6)+one*(1/6); }
  const out={}; for(const v in base){ const nv=(+v)+mod; out[nv]=(out[nv]||0)+base[v]; }
  return out;
}
function rollCombos(dist,n){
  const ents=Object.entries(dist).map(([v,p])=>[+v,p]);
  let combos=[{v:[],p:1}];
  for(let i=0;i<n;i++){ const nx=[]; for(const c of combos) for(const [v,p] of ents) nx.push({v:c.v.concat(v),p:c.p*p}); combos=nx; }
  combos.forEach(c=>c.v.sort((a,b)=>b-a));
  return combos;
}
function roundOutcomes(aCount,dCount,aMod,dMod,reroll1){
  const aC=rollCombos(dieProbs(aMod,reroll1),aCount), dC=rollCombos(dieProbs(dMod,false),dCount);
  const pairs=Math.min(aCount,dCount); const res={};
  for(const a of aC) for(const d of dC){ let aL=0,dL=0;
    for(let i=0;i<pairs;i++){ if(a.v[i]>d.v[i]) dL++; else aL++; }   // defender wins ties
    const key=aL+','+dL; res[key]=(res[key]||0)+a.p*d.p; }
  return res;
}
// Probability the attacker reduces the defender to 0 before being forced back to its garrison floor.
function captureProbability(aFleets,dEff,aMod,dMod,reroll1){
  const cache={}; const rd=(aC,dC)=>{ const k=aC+'x'+dC; return cache[k]||(cache[k]=roundOutcomes(aC,dC,aMod,dMod,reroll1)); };
  const memo=new Map();
  function rec(A,D){
    if(D<=0) return 1;
    const aCount=Math.min(3,A-1); if(aCount<1) return 0;
    const dist=rd(aCount,Math.min(2,D)); let p=0;
    const key=A+','+D; if(memo.has(key)) return memo.get(key);
    for(const k in dist){ const c=k.split(','); p+=dist[k]*rec(Math.max(1,A-(+c[0])), D-(+c[1])); }
    memo.set(key,p); return p;
  }
  return rec(aFleets,dEff);
}
// Forecast an assault from->to in the CURRENT game state, folding in every persistent modifier.
function assaultForecast(fromId,toId){
  const src=G.worlds[fromId], tgt=G.worlds[toId]; const atk=src.owner, def=tgt.owner, pl=P(atk); const mods=[];
  let aMod=0, dMod=0;
  if(pl.battlemed){ aMod+=1; dMod-=1; mods.push('Battle Meditation'); }
  if(src.rage===atk){ aMod+=1; mods.push('Sith Rage +1'); }
  if(tgt.shield===def){ dMod+=1; mods.push('Force Shield +1 def'); }
  if(tgt.dread===def){ aMod-=1; mods.push('Dread −1 atk'); }
  if(pl.foresight) mods.push('Foresight +1');
  if(hasChampionKind('jedi','nomi')){ if(atk==='jedi') aMod+=1; else dMod+=1; mods.push('Battle Meditation (Nomi)'); }
  const aCh=(src.champion && src.champion.side===atk)?src.champion:null, dCh=tgt.champion||null;
  const nexus=(toId===THEATER.nexusId)?1:0; if(nexus) mods.push(`${THEATER.nexusName} nexus +1`);
  const reroll1=!!(aCh&&aCh.kind==='kopecz'); if(reroll1) mods.push('Frenzy · re-roll 1s');
  if(aCh) mods.push(`${CHAMPIONS[aCh.kind].name} joins`);
  if(dCh) mods.push(`Defended by ${CHAMPIONS[dCh.kind].name}`);
  // champions fold into the fleet odds model as effective strength + half their hero-die lean
  const dHp = dCh ? dCh.maxHp : 0;
  const aEff = src.fleets + (aCh?heroDiceN(aCh):0);
  const dEff = tgt.fleets + (dCh? dHp+1 : 0);
  const aMm = aMod + (aCh?Math.round((champBonus(aCh.kind,true)+nexus)/2):0);
  const dMm = dMod + (dCh?Math.round((champBonus(dCh.kind,false)+nexus)/2):0);
  const floor=defenderFloor(toId);
  const pct = floor ? 0 : captureProbability(aEff, dEff, aMm, dMm, reroll1);
  return { pct, mods, floor };
}
function forecastBand(p){ return p>=0.8?'Decisive':p>=0.6?'Favoured':p>=0.4?'Even':p>=0.2?'Risky':'Forlorn'; }
function forecastColor(p){ return p>=0.6?'var(--jedi-glow)':p>=0.4?'var(--gold)':'var(--sith-glow)'; }
// An active Foresight power grants the exact figure; otherwise only a qualitative read.
function forecastPrecise(side){ return !!P(side).foresight; }
function auraList(wid){ const W=G.worlds[wid]; const out=[];
  if(W.barrier)   out.push({s:'⬡',l:'Sealed',     side:W.barrier.side});
  if(W.valor)     out.push({s:'✦',l:'Valor',      side:W.valor});
  if(W.shield)    out.push({s:'◯',l:'Shield',     side:W.shield});
  if(W.dread)     out.push({s:'◌',l:'Dread',      side:W.dread});
  if(W.rage)      out.push({s:'❋',l:'Rage',       side:W.rage});
  if(W.mindtrick) out.push({s:'◐',l:'Mind Trick', side:W.mindtrick.side});
  if(W.illusion)  out.push({s:'◎',l:'Illusion',   side:W.illusion});
  return out.map(a=>({ ...a, c:FAC[a.side]?FAC[a.side].color:'var(--holo)' })); }

/* --------------------------- FORCE PHASE --------------------------------- */
function drawToHand(side){ const pl=P(side);
  while(pl.hand.length<HAND_SIZE){
    if(pl.deck.length===0){ if(pl.discard.length===0) break; pl.deck=shuffle(pl.discard); pl.discard=[]; }
    pl.hand.push(pl.deck.pop());
  } }
function canChannel(side,idx){ const pl=P(side); const id=pl.hand[idx]; const pw=POWERS[id];
  if(!pw) return false; if(livingChampions(side).length===0) return false; return pl.influence>=pw.cost; }
function validPowerTargets(side,id){ const pw=POWERS[id]; if(!pw.target) return [];
  return WORLDS.map(w=>w.id).filter(wid=>{ const W=G.worlds[wid];
    switch(pw.target){
      case 'own': return W.owner===side;
      case 'neutral': return W.owner==='neutral'||W.owner==='manda';
      case 'enemy': return W.owner===opp(side);
      case 'enemyadj': return W.owner===opp(side) && ADJ[wid].some(n=>G.worlds[n].owner===side);
      case 'any': return true;
    } return false; }); }
function channelPower(side,idx,targetId){
  const pl=P(side); const id=pl.hand[idx]; const pw=POWERS[id];
  if(!canChannel(side,idx)) return;
  if(pw.target){ const valid=validPowerTargets(side,id); if(!targetId||!valid.includes(targetId)) return; }
  undoClear();   // §12b — channelling the Force is irreversible
  pl.influence-=pw.cost; pl.hand.splice(idx,1); pl.discard.push(id);
  applyPower(side,id,targetId);
  UI.targeting=null; UI.forceSel=0;
  if(side===G.humanSide && UI.screen==='board') UI.screen='force';   // return from board-targeting
  render();
}
function champLabel(ch){ return ch ? (ch.kind==='neutralguard'?'Independent Warleader':CHAMPIONS[ch.kind].name) : null; }
function revealWorld(side,T,nm){
  if(T.illusion && T.illusion!==side){ logMsg(`<b class="g">${nm}</b> is veiled in Dark Illusion — the vision clouds.`); return; }
  const cn=champLabel(T.champion);
  logMsg(`Vision of <b class="g">${nm}</b>: ${T.fleets} fleet(s)${cn?`, the ${cn}`:''}, held by ${FAC[T.owner].short}.`);
}
function applyPower(side,id,targetId){
  const T=targetId?G.worlds[targetId]:null; const nm=targetId?byId[targetId].name:''; const tag=side[0];
  switch(id){
    /* ---- Light ---- */
    case 'battlemed': P(side).battlemed=true; logMsg(`<b class="${tag}">${FAC[side].short}</b> channels <b class="g">Battle Meditation</b>.`); break;
    case 'foresight': P(side).foresight=true; logMsg(`<b class="${tag}">${FAC[side].short}</b> channels <b class="g">Foresight</b>.`); if(T) revealWorld(side,T,nm); break;
    case 'valor':     T.valor=side; logMsg(`<b class="g">Valor</b> steels ${nm} — it won’t fall below 2 this cycle.`); break;
    case 'mindtrick': T.mindtrick={ side, vs:opp(side) }; logMsg(`<b class="g">Mind Trick</b> turns ${nm} against the ${FAC[opp(side)].short}.`); break;
    case 'barrier':
    case 'sithbarrier': T.barrier={ side }; logMsg(`<b class="g">${POWERS[id].name}</b> seals ${nm} until your next turn.`); break;
    case 'heal':      T.fleets+=2; logMsg(`<b class="g">Force Heal</b> mends ${nm} — +2 fleets.`); break;
    case 'shield':    T.shield=side; logMsg(`<b class="g">Force Shield</b> wards ${nm} — +1 on defence.`); break;
    case 'vision': {  const eh=P(opp(side)).hand.map(x=>POWERS[x].name); logMsg(`<b class="g">Battle Vision</b> reveals the enemy hand: ${eh.length?eh.join(', '):'empty'}.`); break; }
    /* ---- Dark ---- */
    case 'lightning': if(T&&T.fleets>1){ T.fleets--; logMsg(`<b class="s">Force Lightning</b> blasts ${nm} — 1 fleet lost.`);}
                      else logMsg(`<b class="s">Force Lightning</b> crackles over ${nm}, but its garrison holds.`); break;
    case 'darkvision': if(T) revealWorld(side,T,nm); logMsg(`<b class="s">${FAC[side].short}</b> channels <b class="g">Dark Vision</b>.`); break;
    case 'dread':     T.dread=side; logMsg(`<b class="g">Dread</b> grips ${nm} — attackers roll −1 this cycle.`); break;
    case 'corruption':if(T&&T.fleets>1){ T.fleets--; const b=P(side).influence; P(side).influence=clamp(P(side).influence+1,0,INF_CAP);
      logMsg(`<b class="s">Corruption</b> drains ${nm}: −1 fleet, +${P(side).influence-b} ◈.`);} break;
    case 'rage':      T.rage=side; logMsg(`<b class="g">Sith Rage</b> ignites ${nm} — its next assault rolls +1.`); break;
    case 'drain': {   const e=opp(side); if(P(e).influence>0){ P(e).influence-=1; const b=P(side).influence; P(side).influence=clamp(P(side).influence+1,0,INF_CAP);
      logMsg(`<b class="s">Essence Drain</b> siphons ${P(side).influence-b} ◈ from the ${FAC[e].short}.`); } else logMsg(`<b class="s">Essence Drain</b> finds no influence to take.`); break; }
    case 'illusion':  T.illusion=side; logMsg(`<b class="g">Dark Illusion</b> shrouds ${nm} from prying eyes.`); break;
  }
}

/* ---- legendary unlockable (§7c): Nomi Sunrider / Darth Bane ---- */
function legendHost(side){ const cap=G.worlds[capitalOf(side)]; if(!cap.champion) return cap;
  return worldsOf(side).find(w=>!w.champion) || null; }
function canUnlockLegend(side){ const pl=P(side);
  return !pl.legendUnlocked && pl.influence>=LEGEND_COST && G.worlds[capitalOf(side)].owner===side && !!legendHost(side); }
function unlockLegend(side){ if(!canUnlockLegend(side)) return false; const pl=P(side); const kind=LEGEND_OF[side];
  undoClear(); sfx('legend');   // §12b/§12d — summoning a legend is irreversible
  const host=legendHost(side); pl.influence-=LEGEND_COST; pl.legendUnlocked=true; const ch=mkChamp(kind,side);
  if(kind==='bane'){ const f=pl.fallenSith||0; ch.bonusDice=f; ch.maxHp+=f; ch.hp+=f;   // inherits the toll of fallen Sith
    if(f>0) logMsg(`<b class="s">Rule of Two</b> — Bane rises bearing the strength of ${f} fallen (+${f} die, +${f} health).`); }
  host.champion=ch;
  logMsg(`<b class="${side[0]}">${FAC[side].short}</b> unleash a legend — <b class="g">${CHAMPIONS[kind].name}</b> takes the field at ${byId[host.id].name}.`);
  return true; }

/* ============================ AI ========================================== */
function scheduleAI(){ if(aiTimer) clearTimeout(aiTimer); aiTimer=setTimeout(aiStep, 850); }
function aiStep(){
  if(!G || G.over) return; const me=G.aiSide;   // a stray timer after restart (G=null) must be a no-op
  if(UI.screen==='combat' && G.combat) return aiCombat();
  if(G.active!==me) return;
  if(G.phase===0) aiReinforce();
  else if(G.phase===1) aiAssault();
  else if(G.phase===2) aiManeuver();
  else aiForce();
}
function frontWorlds(s){ return worldsOf(s).filter(w=>ADJ[w.id].some(n=>G.worlds[n].owner!==s)); }
function threat(wid){ return ADJ[wid].reduce((s,n)=> s+(G.worlds[n].owner===G.aiSide?0:G.worlds[n].fleets),0); }
// concentrate the bulk of the pool on the spearhead — the held front world nearest the enemy capital
function reinforceConcentrate(side){ const dist=DIST[opp(side)]; const P=aiParams(side);
  const spear=worldsOf(side).filter(w=>isFinite(dist[w.id]) && ADJ[w.id].some(n=>G.worlds[n].owner!==side))
    .sort((a,b)=>dist[a.id]-dist[b.id])[0];
  if(spear){ let n=Math.ceil(G.pool*P.spear); while(n-->0 && G.pool>0){ spear.fleets++; G.pool--; G.reinforced[spear.id]=(G.reinforced[spear.id]||0)+1; } }
  autoDistribute();   // spread whatever remains across the rest of the front
  return spear; }
function aiReinforce(){ const spear=reinforceConcentrate(G.aiSide);
  logMsg(`<b class="${G.aiSide[0]}">${FAC[G.aiSide].short}</b> mass toward ${spear?byId[spear.id].name:'the front'}.`);
  render(); aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },700); }
function aiManeuver(){ const me=G.aiSide, dist=DIST[opp(me)];
  // funnel reserves one hyperlane forward — toward the enemy capital — to build a spearhead
  const movers=worldsOf(me).filter(w=>w.fleets>1 && !G.maneuvered[w.id] && isFinite(dist[w.id]))
    .sort((a,b)=>dist[b.id]-dist[a.id]);   // farthest-back first
  for(const w of movers){
    const fwd=ADJ[w.id].map(n=>G.worlds[n]).filter(x=>x.owner===me && dist[x.id]<dist[w.id]);
    if(fwd.length){ const dest=fwd.sort((a,b)=>dist[a.id]-dist[b.id])[0]; doManeuver(w.id,dest.id,w.fleets-1); } }
  render(); aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },650); }
function aiAssault(){ const m=bestAssault(G.aiSide);
  if(m) startAssault(m.from,m.to); else aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },600); }
function bestAssault(side){ const dist=DIST[opp(side)]; const ecap=capitalOf(opp(side)); const P=aiParams(side);
  let best=null,bestScore=P.baseThresh;
  for(const w of worldsOf(side)){ if(w.fleets<2||G.struck[w.id]) continue;
    const hasCh=w.champion && w.champion.side===side;
    if(Math.min(3,w.fleets-1)+(hasCh?2:0) < 2) continue;             // don't launch an assault aiCombat would instantly break off (<2 dice)
    for(const n of ADJ[w.id]){ if(!isAssaultTarget(w.id,n)) continue;
      if(G.worlds[n].ds && !hasCh) continue;                          // §10d — only a champion can scar the Death Star; don't grind it bare
      const fc=assaultForecast(w.id,n); if(fc.floor) continue;       // can't break a Valor stall
      const isCap=n===ecap;
      let score=fc.pct + Math.max(0,(dist[w.id]-dist[n]))*P.push;     // reward advancing toward the enemy capital (wiser/relentless = more)
      if(isCap) score+=0.6; if(n===THEATER.nexusId) score+=0.22;
      if(G.worlds[n].owner==='neutral'||G.worlds[n].owner==='manda') score+=0.05;
      const thresh=isCap?P.capThresh:P.baseThresh;                   // wiser AI strikes the capital only with the mass to back it
      if(fc.pct>=thresh && score>bestScore){ bestScore=score; best={from:w.id,to:n}; } } }
  return best; }
function aiCombat(){ if(!G || G.over) return; const c=G.combat; if(!c) return;   // scheduled directly — needs its own guards
  if(c.captured){ aiTimer=setTimeout(()=>{ confirmCapture(); scheduleAI(); },800); return; }
  if(c.ended){ aiTimer=setTimeout(()=>{ creditScaling(); UI.screen='board'; G.combat=null; render(); scheduleAI(); },600); return; }
  const src=G.worlds[c.fromId], tgt=G.worlds[c.toId];
  const aChAlive=src.champion && src.champion.side===c.atk;
  const aDice=Math.min(3,src.fleets-1)+(aChAlive?2:0);
  // press the duel; otherwise retreat if spent, stalled, or clearly outmatched with no hero to carry it
  if(!c.duelPending && (aDice<2 || c.stalled ||
      (src.fleets<=2 && !aChAlive && (tgt.fleets + (tgt.champion?2:0))>=3))){
    retreatAssault(); aiTimer=setTimeout(scheduleAI,500); return; }
  combatRoundStep(); render(); aiTimer=setTimeout(aiCombat, 900); }
function aiForce(){ const me=G.aiSide, pl=P(me); const par=aiParams(me);
  if(par.legendEager && canUnlockLegend(me)){ unlockLegend(me); render(); aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },900); return; }
  if(livingChampions(me).length>0){ let bi=-1,bt=null,bv=0;
    pl.hand.forEach((id,idx)=>{ if(!canChannel(me,idx)) return; const e=evalPower(me,id); if(e.val>bv){ bv=e.val; bi=idx; bt=e.target; } });
    if(bi>=0 && bv>=par.forceMin){ channelPower(me,bi,bt); logMsg(`<b class="${me[0]}">${FAC[me].short}</b> draw on the Force.`);   // wiser AI wields the Force more freely
      aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },900); return; } }
  aiTimer=setTimeout(()=>{ advancePhase(); scheduleAI(); },600); }
function adjacentEnemy(side){ const ids=new Set();
  worldsOf(side).forEach(w=>ADJ[w.id].forEach(n=>{ if(G.worlds[n].owner===opp(side)) ids.add(n); }));
  return [...ids].map(id=>G.worlds[id]); }
function evalPower(side,id){ let val=0,target=null;
  const fr=frontWorlds(side);
  const threatened=fr.slice().sort((a,b)=>threat(b.id)-threat(a.id));   // most-pressed first
  const platform=fr.filter(w=>w.fleets>1).sort((a,b)=>             // best attack launchpad
    ADJ[b.id].filter(n=>G.worlds[n].owner!==side).length - ADJ[a.id].filter(n=>G.worlds[n].owner!==side).length);
  const strongestEnemy=()=>WORLDS.map(w=>G.worlds[w.id]).filter(w=>w.owner===opp(side)).sort((a,b)=>b.fleets-a.fleets)[0];
  switch(id){
    /* offensive */
    case 'battlemed': val=platform.length?2.2:0; break;
    case 'rage':      { const t=platform[0]; if(t){ target=t.id; val=1.7; } break; }
    case 'lightning': { const t=strongestEnemy(); if(t&&t.fleets>1){ target=t.id; val=1.8; } break; }
    case 'corruption':{ const t=adjacentEnemy(side).sort((a,b)=>b.fleets-a.fleets)[0]; if(t&&t.fleets>1){ target=t.id; val=1.5; } break; }
    /* defensive */
    case 'barrier': case 'sithbarrier': { const t=threatened[0]; if(t&&threat(t.id)>t.fleets){ target=t.id; val=1.6; } break; }
    case 'shield':    { const t=threatened[0]; if(t&&threat(t.id)>0){ target=t.id; val=1.4; } break; }
    case 'dread':     { const t=threatened[0]; if(t&&threat(t.id)>0){ target=t.id; val=1.35; } break; }
    case 'valor':     { const t=threatened[0]; if(t){ target=t.id; val=1.2; } break; }
    case 'heal':      { const t=threatened.filter(w=>threat(w.id)>0).sort((a,b)=>a.fleets-b.fleets)[0]; if(t&&t.fleets<=3){ target=t.id; val=1.1; } break; }
    /* economy / control / info */
    case 'drain':     { if(P(opp(side)).influence>0){ val=1.0; } break; }
    case 'mindtrick': { const ns=validPowerTargets(side,'mindtrick'); if(ns.length){ target=ns[0]; val=0.8; } break; }
    case 'foresight': case 'darkvision': { const t=strongestEnemy(); if(t){ target=t.id; val=0.45; } break; }
    case 'vision': case 'illusion': val=0.25; if(id==='illusion'){ const t=threatened[0]; if(t) target=t.id; } break;
  }
  return { val, target }; }

// §6.2 — perspective-explicit strike legality (isAssaultTarget reads G.active; the overview reasons about both sides)
function canStrike(fromId,toId,atkSide){ const T=G.worlds[toId];
  if(T.owner===atkSide || T.barrier) return false;
  if(T.mindtrick && T.mindtrick.vs===atkSide) return false;
  if(hasRule('hiddenBase') && toId===capitalOf(THEATER.light) && !G.baseRevealed && atkSide===THEATER.dark) return false;
  return true; }
function humanThreatLevel(wid){ const me=G.humanSide, W=G.worlds[wid]; if(W.owner!==me) return 0;   // my world's worst incoming odds
  const enemy=opp(me); let worst=0;
  for(const n of ADJ[wid]){ const N=G.worlds[n]; if(N.owner!==enemy || N.fleets<2 || !canStrike(n,wid,enemy)) continue;
    worst=Math.max(worst, assaultForecast(n,wid).pct); }
  return worst; }
function humanOpportunity(wid){ const me=G.humanSide, W=G.worlds[wid]; if(W.owner===me) return 0;   // best odds I can bring to bear here
  let best=0;
  for(const n of ADJ[wid]){ const N=G.worlds[n]; if(N.owner!==me || N.fleets<2 || !canStrike(n,wid,me)) continue;
    best=Math.max(best, assaultForecast(n,wid).pct); }
  return best; }
// the at-rest strategic overlay: shown on the human's board turn when nothing is mid-selection
function strategicMark(wid){
  if(!(G.active===G.humanSide && UI.screen==='board' && !UI.src && !UI.targeting && G.phase<=2)) return '';
  const W=G.worlds[wid];
  if(W.owner===G.humanSide){ const t=humanThreatLevel(wid);
    if(t>=0.35) return `<div class="threat-halo" style="${t>=0.6?'border-width:2px':'opacity:.8'}"></div><div class="strat-badge" style="color:var(--sith-glow);border:1px solid var(--sith)" title="Under threat">⚠</div>`;
    return ''; }
  const o=humanOpportunity(wid);
  if(o>=0.4) return `<div class="opp-halo" style="${o>=0.65?'border-width:2px':'opacity:.75'}"></div><div class="strat-badge" style="color:var(--gold);border:1px solid var(--gold)" title="You could take this">↗</div>`;
  return ''; }
function planetExtra(w){ const W=G.worlds[w.id];
  if(UI.screen==='deployheroes') return (G.deployQueue&&G.deployQueue.length&&W.owner===G.deploySide&&!W.champion)?'selectable':'';
  const isHuman=G.active===G.humanSide && UI.screen==='board';

  if(UI.targeting){ return validPowerTargets(G.humanSide,UI.targeting.power).includes(w.id)?'target selectable':''; }
  if(G.phase===1){ if(UI.src){ if(w.id===UI.src) return 'src'; if(ADJ[UI.src].includes(w.id)&&isAssaultTarget(UI.src,w.id)) return 'target selectable'; return ''; } return canAssaultFrom(w.id)?'selectable':''; }
  if(G.phase===2){ if(UI.src){ if(w.id===UI.src) return 'src'; if(ADJ[UI.src].includes(w.id)&&W.owner===G.active) return 'target selectable'; return ''; } return canManeuverFrom(w.id)?'selectable':''; }
  return ''; }

          <h2 class="${k.glow}" style="font-size:25px;font-weight:700;letter-spacing:.02em;margin:4px 0 0">${card.name}</h2>
          <p style="font-size:14px;line-height:1.6;color:var(--ink);margin:11px 0 0">${card.effect}</p>
          <p style="font-size:12.5px;font-style:italic;color:var(--ink-dim);margin:9px 0 0;padding-left:12px;border-left:2px solid ${k.c}">“${card.flavor}”</p>
          <div style="display:flex;gap:12px;align-items:center;margin-top:auto;padding-top:16px">
            <button class="btn primary ${k.cls}" data-act="channel" ${affordable?'':'disabled'}>${noChamp?'No Champion Alive':(pl.influence<card.cost?'Insufficient Influence':'Channel Power →')}</button>
            <span style="font-size:10.5px;color:var(--ink-faint)">${noChamp?'A living champion must focus the power.':`${livingChampions(me).length} champion(s) can focus this.`}</span>
          </div>
        </div>
      </div>
    </div>` : `<div style="flex:1;display:grid;place-items:center;color:var(--ink-dim)">Your hand is empty. End the turn to draw fresh powers.</div>` }
    <div style="flex:none;padding:10px 0 14px;border-top:1px solid var(--line);background:linear-gradient(0deg,rgba(6,12,21,.7),transparent)">
      <div class="eyebrow" style="text-align:center;margin-bottom:9px;color:var(--ink-faint)">Force Hand · select a power to channel</div>
      <div style="display:flex;justify-content:center;gap:13px;flex-wrap:wrap;padding:0 20px">${fan||'<span style="color:var(--ink-faint);font-size:12px">— empty —</span>'}</div>
    </div>
    ${UI.toast?`<div class="toast">${UI.toast}</div>`:''}
  </div>`; }

/* ---- victory ---- */
function viewVictory(){ const win=G.winner, f=FAC[win], k=sc(win), youWon=win===G.humanSide;
  return `<div class="starfield"></div><div class="holo-grid"></div><div class="scanlines"></div>
  <div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center">
    <div class="fade-in">
      <div class="eyebrow" style="letter-spacing:.5em;color:var(--ink-faint)">Campaign Resolved · Cycle ${G.cycle}</div>
      <h1 class="${k.glow}" style="font-size:54px;font-weight:700;letter-spacing:.1em;margin:14px 0 2px;color:${f.glow}">${f.name.toUpperCase()} VICTORY</h1>
      <div style="font-size:17px;color:${youWon?'var(--gold)':'var(--ink-dim)'};margin-bottom:6px">${youWon?'You have won the galaxy.':'The galaxy slips beyond your reach.'}</div>
      <div style="font-size:14px;color:var(--ink-dim);max-width:520px;margin:0 auto 26px;line-height:1.7">
        The ${f.name} ${UI.victoryWhy}.<br/>Worlds — <span class="t-jedi">Jedi ${worldsOf('jedi').length}</span> · <span class="t-sith">Sith ${worldsOf('sith').length}</span>.</div>
      <button class="btn primary jedi" data-act="restart" style="font-size:14px;padding:13px 28px">↺ New Campaign</button>
    </div></div>`; }

/* ============================ EVENTS ====================================== */
$app.addEventListener('click',(e)=>{ const el=e.target.closest('[data-act]'); if(!el) return;
  handle(el.dataset.act, el.dataset.arg); });
document.addEventListener('keydown',(e)=>{ if(e.key!=='Escape'||!G) return;   // Esc closes any open overlay (§12c / §6.1)
  if(UI.showLog){ UI.showLog=false; render(); } else if(UI.showOnboard){ UI.showOnboard=false; onboardSeen(true); render(); } });
function handle(act,arg){
  sfx('click');   // §12d — the click that also lazily wakes the AudioContext on first gesture
  // menu-level
  switch(act){
    case 'gotheater': UI.screen='theater'; if(!UI.theater) UI.theater='galaxy'; render(); return;
    case 'picktheater': if(MAPS[arg] && MAPS[arg].state!=='soon'){ UI.theater=arg; render(); } return;
    case 'confirmtheater': { const id=UI.theater||'galaxy'; if(!MAPS[id]||MAPS[id].state==='soon') return; loadTheater(id); UI.screen='select'; UI.draft=[]; UI.draftLight=null; UI.selSide=(UI.mode==='hotseat')?THEATER.light:null; render(); return; }
    case 'goselect': UI.screen='select'; UI.draft=[]; UI.selSide=null; render(); return;
    case 'backtitle': UI.screen='title'; render(); return;
    case 'setmode': UI.mode=(arg==='hotseat')?'hotseat':'ai'; UI.draft=[]; UI.draftLight=null;   // §14.1 — vs AI / hotseat toggle
      UI.selSide=(UI.mode==='hotseat')?THEATER.light:null; render(); return;
    case 'pickside': if(UI.mode==='hotseat') return; UI.selSide=arg; UI.draft=[]; render(); return;   // §14.2 — hotseat drafts in a fixed order
    case 'ailevel': UI.aiLevel=clamp(parseInt(arg),0,2); render(); return;
    case 'togglemanda': UI.mandaRaids = !(UI.mandaRaids!==false); render(); return;   // §16 — Mandalore raids On/Off at setup
    case 'draft': UI.draft=UI.draft||[]; if(UI.draft.includes(arg)) UI.draft=UI.draft.filter(x=>x!==arg); else if(UI.draft.length<2) UI.draft.push(arg); render(); return;
    case 'begin': {
      if(UI.mode==='hotseat'){ const L=THEATER.light, D=THEATER.dark;            // §14.2 — Light drafts, pass, Dark drafts, launch
        if(UI.draft.length!==2) return;
        if(!UI.draftLight){ UI.draftLight=UI.draft.slice(); UI.draft=[]; UI.selSide=D; showHandoff(D,'draftdark'); return; }
        newGameHotseat(UI.draftLight, UI.draft.slice()); UI.draftLight=null; return; }
      const side=UI.selSide; if(!side||UI.draft.length!==2) return; const aiSide=opp(side);
      newGame(side, UI.draft.slice(), shuffle(DRAFT_POOL[aiSide].slice()).slice(0,2), UI.aiLevel); return; }
    case 'handoffready': { const side=UI.handoffSide, kind=UI.handoffKind;       // §14.4 — the next player is ready
      if(kind==='draftdark'){ UI.screen='select'; render(); return; }
      if(kind==='deploy'){ G.deployQueue=G.pendingDeployQueue; G.pendingDeployQueue=null; UI.screen='deployheroes'; UI.sel=capitalOf(side); render(); return; }
      if(kind==='turn1'){ UI.screen='board'; UI.showOnboard=!onboardSeen(); startTurn(G.firstSide,true); return; }
      UI.screen='board'; startTurn(side,false); return; }
    case 'restart': clearSave(); undoClear(); if(aiTimer){ clearTimeout(aiTimer); aiTimer=null; } G=null; UI={ screen:'title' }; render(); return;   // §12a — New Campaign discards the save (and any in-flight AI timer)
    case 'resume': resumeGame(); return;                                                       // §12a — pick up the autosaved campaign
    case 'showonboard': if(G){ UI.showOnboard=true; render(); } return;                      // §6.1 — reopen the field guide
    case 'dismissonboard': if(G){ UI.showOnboard=false; onboardSeen(true); render(); } return;
    case 'showlog': if(G){ UI.showLog=!UI.showLog; render(); } return;                          // §12c — the Log button toggles the full battle log
    case 'dismisslog': if(G){ UI.showLog=false; render(); } return;
    case 'togglemute': setMuted(!isMuted()); if(G) render(); return;                            // §12d — persisted mute
    case 'noop': return;                                                                        // overlay panel click-trap
  }
  if(!G || G.over) return;
  const isHumanTurn=G.active===G.humanSide;
  if(!isHumanTurn) return; // spectator during AI turn
  switch(act){
    case 'world': onWorldClick(arg); break;
    case 'undo': doUndo(); break;   // §12b — walk back a Reinforce/Maneuver/deploy step
    case 'focus': UI.sel=arg; render(); break;
    case 'alloc': { const [wid,d]=arg.split('|'); allocReinforce(wid, parseInt(d)); break; }
    case 'autodist': autoDistribute(); break;
    case 'confirmdeploy': if(G.pool===0){ advancePhase(); } break;
    case 'deployhero': deployHeroAt(arg); break;
    case 'autodeployheroes': if(G.deployQueue&&G.deployQueue.length){ autoPlaceChampions(G.deploySide, G.deployQueue.slice()); G.deployQueue=[]; finishHeroDeploy(); } break;
    case 'setsrc': UI.src=arg; UI.sel=arg; UI.moveN=1; UI.moveChamp=false; render(); break;
    case 'cancelsrc': UI.src=null; UI.moveChamp=false; render(); break;
    case 'togglechamp': UI.moveChamp=!UI.moveChamp; if(!UI.moveChamp && UI.moveN<1) UI.moveN=1; render(); break;
    case 'moven': { const S=G.worlds[UI.src]; const mx=S.fleets-1; const canBring=S.champion&&S.champion.side===G.humanSide;
      const min=(canBring&&UI.moveChamp)?0:1; UI.moveN=clamp((UI.moveN||1)+parseInt(arg),min,mx); render(); break; }
    case 'domove': { const mx=G.worlds[UI.src].fleets-1; doManeuver(UI.src, arg, clamp(UI.moveN,0,mx), UI.moveChamp); break; }
    case 'relocatechamp': doManeuver(UI.src, arg, 0, true); break;   // move a lone champion off a single-fleet world
    case 'assault': { const [from,to]=arg.split('|'); startAssault(from,to); break; }
    case 'roll': combatRoundStep(); render(); break;
    case 'retreat': retreatAssault(); break;
    case 'capturemoven': { const c=G.combat; if(c&&c.captured){ c.moveN=clamp((c.moveN||0)+parseInt(arg), c.moveMin, c.moveMax); render(); } break; }
    case 'capture': confirmCapture(); break;
    case 'forcesel': UI.forceSel=parseInt(arg); render(); break;
    case 'channel': onChannel(); break;
    case 'unlocklegend': if(G.active===G.humanSide && canUnlockLegend(G.humanSide)){ unlockLegend(G.humanSide); render(); } break;
    case 'casttarget': channelPower(G.humanSide, UI.targeting.idx, arg); break;
    case 'cancelcast': UI.targeting=null; UI.screen='force'; render(); break;
    case 'endforce': advancePhase(); break;
    case 'nextphase': advancePhase(); break;
  }
}
function onWorldClick(wid){ UI.sel=wid;
  if(UI.screen==='deployheroes'){ deployHeroAt(wid); return; }
  if(UI.screen!=='board'){ render(); return; }
  if(UI.targeting){ if(validPowerTargets(G.humanSide,UI.targeting.power).includes(wid)) channelPower(G.humanSide,UI.targeting.idx,wid); else render(); return; }
  if(G.phase===1){ if(UI.src){ if(ADJ[UI.src].includes(wid) && isAssaultTarget(UI.src,wid)) render(); else if(canAssaultFrom(wid)){ UI.src=wid; render(); } else { UI.src=null; render(); } } else if(canAssaultFrom(wid)){ UI.src=wid; render(); } else render(); return; }
  if(G.phase===2){ if(UI.src){ if(UI.src!==wid && ADJ[UI.src].includes(wid) && G.worlds[wid].owner===G.humanSide) render(); else if(canManeuverFrom(wid)){ UI.src=wid; render(); } else { UI.src=null; render(); } } else if(canManeuverFrom(wid)){ UI.src=wid; render(); } else render(); return; }
  render();
}
function onChannel(){ const me=G.humanSide, idx=UI.forceSel, pl=P(me); const id=pl.hand[idx]; if(!id||!canChannel(me,idx)) return;
  const pw=POWERS[id];
  if(pw.target){ UI.targeting={ idx, power:id }; UI.screen='board'; UI.sel=validPowerTargets(me,id)[0]||UI.sel; render(); }
  else channelPower(me, idx, null);
}

/* ====================== §12 — SESSION & QUALITY-OF-LIFE =================== */
// localStorage is wrapped so the headless harness (no localStorage) and private-mode browsers no-op cleanly.
function lsGet(k){ try{ if(typeof localStorage==='undefined') return null; return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ if(typeof localStorage==='undefined') return; localStorage.setItem(k,v); }catch(e){} }
function lsDel(k){ try{ if(typeof localStorage==='undefined') return; localStorage.removeItem(k); }catch(e){} }

// §12a — save & resume. Autosaved at the end of render() while a game is live; never serialize aiTimer (it's not in G/UI).
function saveGame(){ if(!G || G.over || typeof localStorage==='undefined') return;   // skip the stringify cost when there's nothing/nowhere to save
  try{ localStorage.setItem(RULES_EXT.SAVE_KEY, JSON.stringify({ v:RULES_EXT.SAVE_VERSION, theaterId:THEATER.id, G, UI })); }catch(e){} }
function loadSave(){ const raw=lsGet(RULES_EXT.SAVE_KEY); if(!raw) return null;
  try{ const s=JSON.parse(raw);
    if(!s || s.v!==RULES_EXT.SAVE_VERSION || !s.G || s.G.over){ clearSave(); return null; }   // §12a — a stale/finished/old-version save is discarded, not just ignored
    return s; }catch(e){ clearSave(); return null; } }
function clearSave(){ lsDel(RULES_EXT.SAVE_KEY); }
function hasResumableSave(){ return !!loadSave(); }
function resumeGame(){ const s=loadSave(); if(!s) return false;
  loadTheater(s.theaterId);                 // rebind WORLDS/ADJ/CHAMPIONS/… BEFORE adopting the saved G
  G=s.G; UI=s.UI||{ screen:'board' }; undoClear();
  render();
  // re-arm the AI if it was mid-thought: a combat the AI is attacking, or simply the AI's turn
  if(UI.screen==='combat' && G.combat){ if(G.combat.atk===G.aiSide) scheduleAI(); }
  else if(G.active===G.aiSide && !G.over) scheduleAI();
  return true; }

// §12b — undo for the positioning phases only (Reinforce / Maneuver / hero-deploy). Session-only, never saved.
let undoStack=[];
function undoPush(){ if(!G) return; try{ undoStack.push(JSON.stringify(G)); if(undoStack.length>RULES_EXT.UNDO_STACK_MAX) undoStack.shift(); }catch(e){} }
function undoClear(){ undoStack.length=0; }
function canUndo(){ return undoStack.length>0; }
function doUndo(){ if(!undoStack.length) return; let snap=undoStack.pop(); try{ G=JSON.parse(snap); }catch(e){ return; } render(); }
function undoBtn(){ return canUndo()?`<button class="btn" data-act="undo" title="Undo last positioning step" style="font-size:11px">↶ Undo</button>`:''; }

// §12c — battle-log viewer overlay (reuses the field-guide chrome). Newest first; close on ✕/click-outside/Esc.
function logViewerOverlay(){ const me=G.humanSide||G.active;
  return `<div class="onboard-wrap" data-act="dismisslog">
    <div class="onboard-panel panel brackets" data-act="noop" style="max-width:560px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="eyebrow" style="color:var(--gold);letter-spacing:.4em;flex:1">War Log · full history</div>
        <button class="btn" data-act="dismisslog" style="width:28px;height:28px;padding:0;display:grid;place-items:center;font-size:14px">✕</button></div>
      <div class="log" style="margin-top:12px;max-height:60vh;overflow:auto;font-size:11.5px;line-height:1.6">
        ${G.log.length?G.log.map(l=>`<div style="padding:3px 0;border-bottom:1px solid var(--line)">${l}</div>`).join(''):'<div style="color:var(--ink-faint)">No entries yet.</div>'}</div>
    </div></div>`; }

// §12d — synthesized sound + mute (Web Audio; no asset files). All calls are a clean no-op headless / when muted.
let _audioCtx=null, _muted=null;
function isMuted(){ if(_muted===null) _muted=(lsGet(RULES_EXT.MUTE_KEY)==='1'); return _muted; }
function setMuted(m){ _muted=!!m; lsSet(RULES_EXT.MUTE_KEY, m?'1':'0'); }
function audioCtx(){ if(isMuted()) return null;
  const AC=(typeof AudioContext!=='undefined')?AudioContext:(typeof webkitAudioContext!=='undefined'?webkitAudioContext:null);
  if(!AC) return null;
  try{ if(!_audioCtx) _audioCtx=new AC(); if(_audioCtx.state==='suspended') _audioCtx.resume(); return _audioCtx; }catch(e){ return null; } }
// short, quiet blips keyed by beat — peak gain ≤ SFX_PEAK_GAIN, duration ≤ ~0.3s
const SFX={ click:[440,0.05,'square',0.06], dice:[180,0.09,'triangle',0.12], duel:[660,0.16,'sawtooth',0.16],
  capture:[520,0.22,'triangle',0.16], phase:[330,0.10,'sine',0.10], legend:[784,0.28,'sine',0.18],
  bomb:[70,0.30,'sawtooth',0.18], defeat:[110,0.30,'sine',0.16] };
function sfx(type){ if(isMuted()) return; const ctx=audioCtx(); if(!ctx) return;
  const p=SFX[type]||SFX.click; const [freq,dur,wave,peak]=p;
  try{ const o=ctx.createOscillator(), g=ctx.createGain(); o.type=wave; o.frequency.value=freq;
    const t=ctx.currentTime, vol=Math.min(peak, RULES_EXT.SFX_PEAK_GAIN);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    if(type==='capture'||type==='legend') o.frequency.exponentialRampToValueAtTime(freq*1.6,t+dur);   // a small rising flourish
    if(type==='bomb'||type==='defeat')    o.frequency.exponentialRampToValueAtTime(freq*0.5,t+dur);   // …or a falling one
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+dur+0.02); }catch(e){} }

/* ============================ BOOT ======================================== */
UI={ screen:'title' };
render();
</script>
